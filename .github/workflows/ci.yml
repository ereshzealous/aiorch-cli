name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev extras
        run: pip install -e '.[dev]'

      - name: Import smoke test
        run: python -c "import aiorch; print(aiorch.__version__)"

      - name: CLI --help
        run: aiorch --help

      - name: Unit tests
        run: pytest -v

      - name: Validate every non-LLM pipeline
        run: |
          shopt -s nullglob
          files=(examples/core/*.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No core pipelines found under examples/core/"
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "::group::validate $f"
            aiorch validate "$f"
            echo "::endgroup::"
          done

      - name: Run non-LLM pipelines end-to-end
        # Executes every examples/core/*.yaml with the arg set its README
        # documents. Three pipelines are deliberately skipped:
        #   13 — known CLI bug: -i KEY=@file.bin UTF-8-decodes before
        #        consulting `format: binary`. Re-enable after the fix.
        #   25 — probes http://localhost:5173/api/health, which only
        #        exists when the commercial Platform API is running.
        #        Not portable to a clean runner.
        #   38 — demonstration of retry-exhaustion: strategy_2_patient
        #        uses random.random() < 0.75 per attempt so ~31% of
        #        runs terminally fail. By design; run locally to inspect.
        run: |
          set -u
          shopt -s nullglob
          declare -A ARGS=(
            [02]="-i greeting=Hello -i repeat=3 -i name=Eresh"
            [07]="-i document=@./inputs/sample.txt"
            [08]="-i document=@./inputs/prose.txt"
            [09]="-i document=@./inputs/prose.txt"
            [10]="-i name=Eresh -i count=7 -i phrase=hello_from_aiorch"
            [11]="-i order=@./inputs/order.json"
            [12]="-i sales=@./inputs/sales.csv"
            [21]="-i trigger_expensive=true"
            [27]="--input ./inputs/batch-inputs.json"
            [31]="-i mode=fast"
            [32]="-i a=3 -i b=4 -i c=5 -i d=2"
          )
          SKIP=(13 25 38)

          cd examples/core
          fail=0
          for f in $(ls *.yaml | sort); do
            num=${f:0:2}
            if printf '%s\n' "${SKIP[@]}" | grep -qx "$num"; then
              echo "::notice file=examples/core/$f::skipped ($num)"
              continue
            fi
            extra="${ARGS[$num]:-}"
            echo "::group::run $f $extra"
            if aiorch run "$f" $extra; then
              echo "PASS $f"
            else
              echo "::error file=examples/core/$f::run failed"
              fail=$((fail + 1))
            fi
            echo "::endgroup::"
          done
          if [ $fail -gt 0 ]; then
            echo "::error::$fail pipeline(s) failed"
            exit 1
          fi
