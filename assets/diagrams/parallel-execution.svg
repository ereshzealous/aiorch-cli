<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="580" fill="#fbf9f3"/>

  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">Parallel layer execution</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">Four workers on the same DAG layer finish in the wall-clock time of the slowest — not the sum.</text>
  <line x1="60" y1="100" x2="220" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Time axis -->
  <g transform="translate(280, 420)">
    <line x1="0" y1="0" x2="820" y2="0" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="-30" y="5" font-size="11" fill="#5c5c5c" font-family="'SF Mono', Menlo, monospace">t = 0</text>

    <!-- tick marks at 0, 250, 500, 750, 1000 ms (scaled to fit 820px) -->
    <g stroke="#1a1a1a" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="6"/>
      <line x1="205" y1="0" x2="205" y2="6"/>
      <line x1="410" y1="0" x2="410" y2="6"/>
      <line x1="615" y1="0" x2="615" y2="6"/>
      <line x1="820" y1="0" x2="820" y2="6"/>
    </g>
    <g font-size="10" fill="#5c5c5c" font-family="'SF Mono', Menlo, monospace" text-anchor="middle">
      <text x="0" y="22">0</text>
      <text x="205" y="22">250 ms</text>
      <text x="410" y="22">500 ms</text>
      <text x="615" y="22">750 ms</text>
      <text x="820" y="22">1000 ms</text>
    </g>
  </g>

  <!-- Labels on the left for each swim lane -->
  <g font-family="'SF Mono', Menlo, monospace" font-size="11.5" fill="#3a3a3a">
    <text x="60" y="158">stage</text>
    <text x="60" y="198">worker_sum</text>
    <text x="60" y="238">worker_max</text>
    <text x="60" y="278">worker_mean</text>
    <text x="60" y="318">worker_count_evens</text>
    <text x="60" y="362">aggregate</text>
    <text x="60" y="402">show</text>
  </g>

  <!-- Layer band labels on far left -->
  <g font-family="Charter, Georgia, serif" font-size="10.5" font-weight="600" letter-spacing="1.5" fill="#b45309">
    <text x="20" y="158">L1</text>
    <text x="20" y="258">L2</text>
    <text x="20" y="362">L3</text>
    <text x="20" y="402">L4</text>
  </g>

  <!-- Backdrop shading for Layer 2 (to emphasize parallelism) -->
  <rect x="280" y="180" width="820" height="148" fill="#fef3c7" opacity="0.5"/>
  <text x="1110" y="254" font-family="Charter, Georgia, serif" font-size="12" font-style="italic" fill="#b45309">Layer 2 band</text>
  <text x="1110" y="268" font-size="10.5" fill="#8a8275" font-style="italic">4 steps overlap</text>

  <!-- Bars. x is time (1px = ~1.22ms given 820px = 1000ms, but let me use 1px = 1ms roughly) -->
  <!-- Actually let me scale: 820px = 1000ms. So 1ms = 0.82px. -->
  <!-- Convert: stage 0-11ms = 0 to 9px wide -->
  <!-- Simpler: use 1ms = 1px so 820px = 820ms max. Since observed max is ~550ms, fits. -->
  <!-- Actually I want prominent bars. Let's use 1ms = 1.5px, 820px = 546ms. Extend axis to make this fit. -->
  <!-- Let's redo: 820px = 600ms, so 1ms ≈ 1.37px -->

  <!-- Or: keep axis as 0-1000ms = 820px, and make bars with that scale. -->
  <!-- stage: 11ms = 9px wide at x=280 -->

  <!-- Stage bar (11ms) at x=280, width=9 -->
  <g transform="translate(280, 146)">
    <rect x="0" y="0" width="9" height="24" rx="2" fill="#475569"/>
    <text x="14" y="16" font-size="10" fill="#5c5c5c">11 ms</text>
  </g>

  <!-- Layer 2 bars (all start at x=9, width=508-511) -->
  <!-- 508ms = 417px, 509 = 417px, 510 = 418px, 511 = 419px -->
  <g transform="translate(289, 186)">
    <rect x="0" y="0" width="417" height="24" rx="2" fill="#b45309"/>
    <text x="425" y="16" font-size="10" fill="#5c5c5c">508 ms</text>
  </g>
  <g transform="translate(289, 226)">
    <rect x="0" y="0" width="417" height="24" rx="2" fill="#b45309"/>
    <text x="425" y="16" font-size="10" fill="#5c5c5c">509 ms</text>
  </g>
  <g transform="translate(289, 266)">
    <rect x="0" y="0" width="418" height="24" rx="2" fill="#b45309"/>
    <text x="426" y="16" font-size="10" fill="#5c5c5c">510 ms</text>
  </g>
  <g transform="translate(289, 306)">
    <rect x="0" y="0" width="419" height="24" rx="2" fill="#b45309"/>
    <text x="427" y="16" font-size="10" fill="#5c5c5c">511 ms</text>
  </g>

  <!-- Aggregate (10ms) starts at 522ms = 428px -->
  <g transform="translate(708, 350)">
    <rect x="0" y="0" width="8" height="24" rx="2" fill="#475569"/>
    <text x="14" y="16" font-size="10" fill="#5c5c5c">10 ms</text>
  </g>

  <!-- Show (15ms) starts at 535ms = 439px -->
  <g transform="translate(719, 390)">
    <rect x="0" y="0" width="12" height="24" rx="2" fill="#475569"/>
    <text x="18" y="16" font-size="10" fill="#5c5c5c">15 ms</text>
  </g>

  <!-- Wall-clock total marker -->
  <line x1="731" y1="140" x2="731" y2="410" stroke="#b45309" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="740" y="142" font-family="Charter, Georgia, serif" font-size="11" font-style="italic" fill="#b45309">wall-clock total · 550 ms</text>

  <!-- Serial-world comparison bracket -->
  <g transform="translate(280, 460)">
    <text x="0" y="0" font-family="Charter, Georgia, serif" font-size="13" font-weight="600" fill="#1a1a1a">The same pipeline serialised would take</text>
    <text x="0" y="20" font-size="12" fill="#3a3a3a">
      <tspan font-family="'SF Mono', Menlo, monospace" font-size="11.5">11 + 508 + 509 + 510 + 511 + 10 + 15</tspan> = <tspan font-family="'SF Mono', Menlo, monospace" font-size="11.5" fill="#b45309" font-weight="700">2 074 ms</tspan>.
      With DAG layering it runs in <tspan font-family="'SF Mono', Menlo, monospace" font-size="11.5" fill="#b45309" font-weight="700">550 ms</tspan> — <tspan font-weight="700">a 3.8× speed-up</tspan>, free.
    </text>
    <text x="0" y="40" font-size="11.5" fill="#5c5c5c" font-style="italic">No thread-pool code to write. No <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">asyncio.gather()</tspan>. The DAG does it.</text>
  </g>
</svg>
