<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 620"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="1220" height="620" fill="#f4f5f7"/>

  <text x="70" y="62" font-size="32" font-weight="700" fill="#1e1e1e" letter-spacing="-0.5">Parallel layer execution</text>
  <path d="M 70 82 Q 180 78, 290 82 T 420 82" stroke="#c2410c" stroke-width="3" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="70" y="108" font-size="14" fill="#3f3f46">Four workers on the same DAG layer finish in the wall-clock time of the slowest — not the sum.</text>

  <!-- Time axis -->
  <g transform="translate(300, 440)">
    <line x1="0" y1="0" x2="820" y2="0" stroke="#1e1e1e" stroke-width="1.5" filter="url(#sketch2)"/>
    <text x="-30" y="5" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#71717a">t=0</text>
    <g stroke="#1e1e1e" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="6"/>
      <line x1="205" y1="0" x2="205" y2="6"/>
      <line x1="410" y1="0" x2="410" y2="6"/>
      <line x1="615" y1="0" x2="615" y2="6"/>
      <line x1="820" y1="0" x2="820" y2="6"/>
    </g>
    <g font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46" text-anchor="middle">
      <text x="0" y="22">0</text>
      <text x="205" y="22">250 ms</text>
      <text x="410" y="22">500 ms</text>
      <text x="615" y="22">750 ms</text>
      <text x="820" y="22">1000 ms</text>
    </g>
  </g>

  <!-- Lane labels -->
  <g font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" fill="#1e1e1e">
    <text x="70" y="182">stage</text>
    <text x="70" y="224">worker_sum</text>
    <text x="70" y="266">worker_max</text>
    <text x="70" y="308">worker_mean</text>
    <text x="70" y="350">worker_count_evens</text>
    <text x="70" y="392">aggregate</text>
    <text x="70" y="424">show</text>
  </g>

  <!-- Layer chips on far-left -->
  <g transform="translate(20, 180)">
    <g filter="url(#sketch)"><circle cx="0" cy="0" r="14" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/></g>
    <text x="0" y="5" font-size="11" font-weight="700" fill="#1e1e1e" text-anchor="middle">L1</text>
  </g>
  <g transform="translate(20, 288)">
    <g filter="url(#sketch)"><circle cx="0" cy="0" r="14" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/></g>
    <text x="0" y="5" font-size="11" font-weight="700" fill="#1e1e1e" text-anchor="middle">L2</text>
  </g>
  <g transform="translate(20, 390)">
    <g filter="url(#sketch)"><circle cx="0" cy="0" r="14" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/></g>
    <text x="0" y="5" font-size="11" font-weight="700" fill="#1e1e1e" text-anchor="middle">L3</text>
  </g>
  <g transform="translate(20, 422)">
    <g filter="url(#sketch)"><circle cx="0" cy="0" r="14" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/></g>
    <text x="0" y="5" font-size="11" font-weight="700" fill="#1e1e1e" text-anchor="middle">L4</text>
  </g>

  <!-- Backdrop shading for L2 -->
  <rect x="300" y="200" width="820" height="148" fill="#ffec99" opacity="0.35"/>
  <text x="1130" y="276" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#c2410c">L2 band</text>
  <text x="1130" y="292" font-size="11" fill="#3f3f46">4 steps</text>
  <text x="1130" y="306" font-size="11" fill="#3f3f46">overlap</text>

  <!-- Bars — 1ms ≈ 0.82px, 820px = 1000ms -->
  <!-- stage (11ms) at 300+0 = 300, w=9 -->
  <g filter="url(#sketch)">
    <rect x="300" y="172" width="9" height="18" rx="2" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="314" y="186" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">11 ms</text>

  <!-- L2 bars start at x=309 (after 11ms) -->
  <g filter="url(#sketch)">
    <rect x="309" y="214" width="417" height="18" rx="2" fill="#c2410c" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="733" y="228" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">508 ms</text>

  <g filter="url(#sketch)">
    <rect x="309" y="256" width="417" height="18" rx="2" fill="#c2410c" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="733" y="270" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">509 ms</text>

  <g filter="url(#sketch)">
    <rect x="309" y="298" width="418" height="18" rx="2" fill="#c2410c" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="734" y="312" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">510 ms</text>

  <g filter="url(#sketch)">
    <rect x="309" y="340" width="419" height="18" rx="2" fill="#c2410c" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="735" y="354" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">511 ms</text>

  <!-- L3 aggregate 10ms at 522ms = 428px -->
  <g filter="url(#sketch)">
    <rect x="728" y="382" width="8" height="18" rx="2" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="742" y="396" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">10 ms</text>

  <!-- L4 show 15ms at 535ms = 439px -->
  <g filter="url(#sketch)">
    <rect x="739" y="414" width="12" height="18" rx="2" fill="#d0bfff" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
  <text x="757" y="428" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">15 ms</text>

  <!-- Wall-clock marker -->
  <line x1="751" y1="160" x2="751" y2="434" stroke="#c2410c" stroke-width="1.2" stroke-dasharray="4 3" filter="url(#sketch2)"/>
  <text x="762" y="162" font-size="12" fill="#c2410c" font-weight="600" font-style="italic">wall-clock total · 550 ms</text>

  <!-- Summary block at bottom -->
  <g filter="url(#sketch2)">
    <rect x="300" y="492" width="820" height="110" fill="#ffec99" stroke="#1e1e1e" stroke-width="1.5" rx="6"/>
  </g>
  <text x="318" y="518" font-size="14" font-weight="700" fill="#1e1e1e">The same pipeline serialised would take</text>
  <text x="318" y="544" font-size="13" fill="#3f3f46"><tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12">11 + 508 + 509 + 510 + 511 + 10 + 15</tspan> = <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" fill="#c2410c" font-weight="700">2,074 ms</tspan>.</text>
  <text x="318" y="564" font-size="13" fill="#3f3f46">With DAG layering it runs in <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" fill="#c2410c" font-weight="700">550 ms</tspan> — a <tspan font-weight="700">3.8× speed-up</tspan>, free.</text>
  <text x="318" y="588" font-size="12" fill="#71717a" font-style="italic">No thread-pool code to write. No <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11">asyncio.gather()</tspan>. The DAG does it.</text>
</svg>
