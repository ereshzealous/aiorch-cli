<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrNet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f4c75"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="780" fill="#fbf9f3"/>

  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">How primitives run on the host</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">aiorch doesn't bundle its own Python, shell, or tools. It uses <tspan font-style="italic">yours</tspan> — and that's the part most orchestrator docs skip.</text>
  <line x1="60" y1="100" x2="220" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Outer box: your machine / CI runner -->
  <g transform="translate(60, 140)">
    <rect width="1120" height="560" rx="14" fill="#ffffff" stroke="#8a8275" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="24" y="28" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#5c5c5c" letter-spacing="0.3">YOUR MACHINE  ·  CI RUNNER  ·  CONTAINER</text>
  </g>

  <!-- aiorch process box -->
  <g transform="translate(100, 220)" filter="url(#softShadow)">
    <rect width="240" height="140" rx="10" fill="#fef3c7" stroke="#1a1a1a" stroke-width="2"/>
    <text x="20" y="30" font-family="Charter, Georgia, serif" font-size="17" font-weight="700" fill="#1a1a1a">aiorch process</text>
    <text x="20" y="50" font-size="11" fill="#8a8275" font-style="italic">the only thing in git</text>
    <line x1="20" y1="60" x2="220" y2="60" stroke="#d4c899"/>
    <text x="20" y="84" font-size="12" fill="#3a3a3a">Parser · DAG · Executor</text>
    <text x="20" y="104" font-size="12" fill="#3a3a3a">Primitive dispatcher</text>
    <text x="20" y="124" font-size="11" fill="#5c5c5c" font-style="italic">pip install aiorch</text>
  </g>

  <!-- Host OS box -->
  <g transform="translate(420, 200)">
    <rect width="380" height="480" rx="10" fill="#f7f4e8" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="20" y="28" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">Host OS · not bundled with aiorch</text>
    <text x="20" y="48" font-size="11" fill="#8a8275" font-style="italic">installed tools, not git-controlled</text>

    <!-- Your Python -->
    <g transform="translate(20, 70)" filter="url(#softShadow)">
      <rect width="340" height="80" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">Your Python interpreter</text>
      <text x="14" y="40" font-size="11" fill="#5c5c5c">whatever was used to <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">pip install aiorch</tspan></text>
      <text x="14" y="56" font-size="11" fill="#5c5c5c">plus whatever you've <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">pip install</tspan>-ed alongside</text>
      <text x="14" y="72" font-size="10.5" fill="#b45309" font-style="italic">import pandas → resolves here</text>
    </g>

    <!-- Your shell -->
    <g transform="translate(20, 170)" filter="url(#softShadow)">
      <rect width="340" height="80" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">Your shell</text>
      <text x="14" y="40" font-size="11" fill="#5c5c5c"><tspan font-family="'SF Mono', Menlo, monospace" font-size="11">/bin/sh -c "&lt;command&gt;"</tspan> via subprocess</text>
      <text x="14" y="56" font-size="11" fill="#5c5c5c">inherits the shell's <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">$PATH</tspan>, cwd, env vars</text>
      <text x="14" y="72" font-size="10.5" fill="#b45309" font-style="italic">jq not installed → step fails</text>
    </g>

    <!-- Env vars -->
    <g transform="translate(20, 270)" filter="url(#softShadow)">
      <rect width="340" height="80" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">Environment variables</text>
      <text x="14" y="40" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#5c5c5c">$PATH · $HOME · $OPENAI_API_KEY · ...</text>
      <text x="14" y="56" font-size="11" fill="#5c5c5c">visible to both Python and shell steps</text>
      <text x="14" y="72" font-size="10.5" fill="#b45309" font-style="italic">ghosted from git — the gotcha</text>
    </g>

    <!-- Installed tools -->
    <g transform="translate(20, 370)" filter="url(#softShadow)">
      <rect width="340" height="80" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">Installed tools</text>
      <text x="14" y="40" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#5c5c5c">git · curl · jq · sqlite3 · awk · ...</text>
      <text x="14" y="56" font-size="11" fill="#5c5c5c">resolved by <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">$PATH</tspan> at subprocess time</text>
      <text x="14" y="72" font-size="10.5" fill="#b45309" font-style="italic">install these in CI before aiorch run</text>
    </g>
  </g>

  <!-- Remote services box -->
  <g transform="translate(840, 200)">
    <rect width="320" height="320" rx="10" fill="#f0f4f8" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="20" y="28" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">External services</text>
    <text x="20" y="48" font-size="11" fill="#8a8275" font-style="italic">network, not local</text>

    <g transform="translate(20, 70)" filter="url(#softShadow)">
      <rect width="280" height="70" rx="6" fill="#ffffff" stroke="#0f4c75" stroke-width="1.2"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="13" font-weight="600" fill="#1a1a1a">LLM provider</text>
      <text x="14" y="40" font-size="11" fill="#5c5c5c">via LiteLLM</text>
      <text x="14" y="56" font-family="'SF Mono', Menlo, monospace" font-size="10.5" fill="#0f4c75">OpenAI · Anthropic · OpenRouter · ...</text>
    </g>

    <g transform="translate(20, 160)" filter="url(#softShadow)">
      <rect width="280" height="60" rx="6" fill="#ffffff" stroke="#0f4c75" stroke-width="1.2"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="13" font-weight="600" fill="#1a1a1a">HTTP endpoints</text>
      <text x="14" y="40" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#5c5c5c">type: http inputs</text>
    </g>

    <g transform="translate(20, 240)" filter="url(#softShadow)">
      <rect width="280" height="60" rx="6" fill="#ffffff" stroke="#0f4c75" stroke-width="1.2"/>
      <text x="14" y="22" font-family="Charter, Georgia, serif" font-size="13" font-weight="600" fill="#1a1a1a">Databases</text>
      <text x="14" y="40" font-size="11" fill="#5c5c5c">whatever driver you imported in python</text>
    </g>
  </g>

  <!-- Arrows from aiorch to host pieces -->
  <g stroke="#b45309" stroke-width="2" fill="none">
    <path d="M 342 258 C 380 258, 400 258, 438 268" marker-end="url(#arrAccent)"/>
    <path d="M 342 290 C 380 320, 400 340, 438 368" marker-end="url(#arrAccent)"/>
  </g>
  <text x="350" y="236" font-size="10.5" fill="#b45309" font-family="'SF Mono', Menlo, monospace">python step</text>
  <text x="350" y="380" font-size="10.5" fill="#b45309" font-family="'SF Mono', Menlo, monospace">run step</text>

  <!-- Arrows from aiorch to remote over network -->
  <g stroke="#0f4c75" stroke-width="2" fill="none" stroke-dasharray="5 3">
    <path d="M 342 300 C 500 140, 750 160, 856 260" marker-end="url(#arrNet)"/>
  </g>
  <text x="590" y="190" font-size="10.5" fill="#0f4c75" font-family="'SF Mono', Menlo, monospace" font-style="italic">prompt step · over network</text>

  <!-- Callout box at the bottom -->
  <g transform="translate(100, 560)">
    <rect width="1040" height="110" rx="8" fill="#fef9e7" stroke="#d4c899" stroke-width="1"/>
    <text x="20" y="28" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">The ghosted-in-git problem</text>
    <text x="20" y="52" font-size="12.5" fill="#3a3a3a">Your pipeline YAML is version-controlled. The environment it runs against is not.</text>
    <text x="20" y="70" font-size="12" fill="#5c5c5c">Two machines with different <tspan font-family="'SF Mono', Menlo, monospace" font-size="11.5">$PATH</tspan>, different installed packages, different env vars will produce different results from the <tspan font-style="italic">same</tspan> YAML.</text>
    <text x="20" y="90" font-size="12" fill="#5c5c5c">In CI: install the tools, export the secrets, pin the Python version. aiorch doesn't do this for you — that's the commercial Platform's job.</text>
  </g>
</svg>
