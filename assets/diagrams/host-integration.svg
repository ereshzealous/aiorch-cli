<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 820"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrInk" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <marker id="arrNet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f4c75"/>
    </marker>
  </defs>

  <rect width="1260" height="820" fill="#f4f5f7"/>

  <text x="70" y="62" font-size="32" font-weight="700" fill="#1e1e1e" letter-spacing="-0.5">How primitives run on the host</text>
  <path d="M 70 82 Q 180 78, 300 82 T 480 82" stroke="#c2410c" stroke-width="3" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="70" y="110" font-size="14" fill="#3f3f46">aiorch does not bundle its own Python, shell, or tools. It uses <tspan font-style="italic">yours</tspan> —</text>
  <text x="70" y="130" font-size="14" fill="#3f3f46">and that is the part most orchestrator docs skip.</text>

  <!-- Outer machine boundary -->
  <g filter="url(#sketch)">
    <rect x="70" y="160" width="1130" height="560" fill="none" stroke="#8a8a91" stroke-width="1.5" stroke-dasharray="6 4" rx="8"/>
  </g>
  <text x="90" y="184" font-size="11" font-weight="600" fill="#71717a" letter-spacing="1.8">YOUR MACHINE · CI RUNNER · CONTAINER</text>

  <!-- aiorch process -->
  <g filter="url(#sketch)">
    <rect x="110" y="220" width="260" height="150" fill="#ffec99" stroke="#1e1e1e" stroke-width="3" rx="6"/>
  </g>
  <text x="130" y="254" font-size="20" font-weight="700" fill="#1e1e1e">aiorch process</text>
  <text x="130" y="274" font-size="12" fill="#8b6914">the only thing in git</text>
  <line x1="130" y1="286" x2="350" y2="286" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <text x="130" y="310" font-size="13" fill="#1e1e1e">Parser · DAG · Executor</text>
  <text x="130" y="330" font-size="13" fill="#1e1e1e">Primitive dispatcher</text>
  <text x="130" y="354" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#8b6914">pip install aiorch</text>

  <!-- Host OS box -->
  <g filter="url(#sketch)">
    <rect x="430" y="220" width="390" height="480" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2" rx="6"/>
  </g>
  <text x="450" y="252" font-size="17" font-weight="700" fill="#1e1e1e">Host OS</text>
  <text x="450" y="272" font-size="12" fill="#1c6ea4">not bundled with aiorch</text>

  <g filter="url(#sketch2)">
    <rect x="450" y="290" width="350" height="90" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.8" rx="5"/>
  </g>
  <text x="466" y="316" font-size="15" font-weight="700" fill="#1e1e1e">Your Python interpreter</text>
  <text x="466" y="336" font-size="12" fill="#3f3f46">whatever was used to <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11">pip install aiorch</tspan></text>
  <text x="466" y="354" font-size="12" fill="#3f3f46">plus whatever you've installed alongside</text>
  <text x="466" y="370" font-size="11" fill="#c2410c" font-style="italic">import pandas → resolves here</text>

  <g filter="url(#sketch2)">
    <rect x="450" y="400" width="350" height="85" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.8" rx="5"/>
  </g>
  <text x="466" y="426" font-size="15" font-weight="700" fill="#1e1e1e">Your shell</text>
  <text x="466" y="446" font-size="12" fill="#3f3f46"><tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11">/bin/sh -c "&lt;command&gt;"</tspan> via subprocess</text>
  <text x="466" y="464" font-size="12" fill="#3f3f46">inherits the shell's <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11">$PATH</tspan>, cwd, env</text>
  <text x="466" y="480" font-size="11" fill="#c2410c" font-style="italic">jq not installed → step fails</text>

  <g filter="url(#sketch2)">
    <rect x="450" y="505" width="350" height="85" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.8" rx="5"/>
  </g>
  <text x="466" y="531" font-size="15" font-weight="700" fill="#1e1e1e">Environment variables</text>
  <text x="466" y="551" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">$PATH · $HOME · $OPENAI_API_KEY · ...</text>
  <text x="466" y="569" font-size="12" fill="#3f3f46">visible to both Python and shell steps</text>
  <text x="466" y="585" font-size="11" fill="#c2410c" font-style="italic">ghosted from git — the gotcha</text>

  <g filter="url(#sketch2)">
    <rect x="450" y="610" width="350" height="72" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.8" rx="5"/>
  </g>
  <text x="466" y="636" font-size="15" font-weight="700" fill="#1e1e1e">Installed tools</text>
  <text x="466" y="656" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">git · curl · jq · sqlite3 · awk · ...</text>
  <text x="466" y="672" font-size="11" fill="#c2410c" font-style="italic">install these in CI before aiorch run</text>

  <!-- Remote services -->
  <g filter="url(#sketch)">
    <rect x="870" y="220" width="310" height="340" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2" rx="6"/>
  </g>
  <text x="890" y="252" font-size="17" font-weight="700" fill="#1e1e1e">External services</text>
  <text x="890" y="272" font-size="12" fill="#6741d9">network, not local</text>

  <g filter="url(#sketch2)">
    <rect x="890" y="290" width="270" height="70" fill="#ffffff" stroke="#0f4c75" stroke-width="1.8" rx="5"/>
  </g>
  <text x="906" y="316" font-size="14" font-weight="700" fill="#1e1e1e">LLM provider</text>
  <text x="906" y="336" font-size="12" fill="#3f3f46">via LiteLLM</text>
  <text x="906" y="352" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#0f4c75">OpenAI · Anthropic · OpenRouter · ...</text>

  <g filter="url(#sketch2)">
    <rect x="890" y="380" width="270" height="60" fill="#ffffff" stroke="#0f4c75" stroke-width="1.8" rx="5"/>
  </g>
  <text x="906" y="406" font-size="14" font-weight="700" fill="#1e1e1e">HTTP endpoints</text>
  <text x="906" y="424" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#3f3f46">type: http inputs</text>

  <g filter="url(#sketch2)">
    <rect x="890" y="460" width="270" height="60" fill="#ffffff" stroke="#0f4c75" stroke-width="1.8" rx="5"/>
  </g>
  <text x="906" y="486" font-size="14" font-weight="700" fill="#1e1e1e">Databases</text>
  <text x="906" y="504" font-size="12" fill="#3f3f46">whatever driver you imported</text>

  <!-- Arrows from aiorch to host pieces -->
  <path d="M 372 304 C 400 312, 420 325, 448 335" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrAccent)" filter="url(#sketch2)"/>
  <text x="384" y="296" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#c2410c">python step</text>

  <path d="M 372 340 C 400 380, 420 420, 448 440" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrAccent)" filter="url(#sketch2)"/>
  <text x="384" y="408" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#c2410c">run step</text>

  <!-- Arrow to remote over network -->
  <path d="M 372 280 C 500 200, 750 200, 886 310" stroke="#0f4c75" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-end="url(#arrNet)" filter="url(#sketch2)"/>
  <text x="600" y="220" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#0f4c75" font-style="italic">prompt step · over network</text>

  <!-- Bottom warning callout -->
  <g filter="url(#sketch2)">
    <rect x="110" y="600" width="310" height="100" fill="#ffec99" stroke="#c2410c" stroke-width="1.5" rx="6"/>
  </g>
  <text x="128" y="624" font-size="14" font-weight="700" fill="#c2410c">The ghosted-in-git problem</text>
  <text x="128" y="646" font-size="12" fill="#3f3f46">Your YAML is version-controlled.</text>
  <text x="128" y="662" font-size="12" fill="#3f3f46">The environment it runs against is not.</text>
  <text x="128" y="684" font-size="11" fill="#3f3f46" font-style="italic">In CI: install the tools, export the secrets,</text>
  <text x="128" y="698" font-size="11" fill="#3f3f46" font-style="italic">pin the Python version.</text>
</svg>
