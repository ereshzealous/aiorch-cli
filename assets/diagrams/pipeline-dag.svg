<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="460" fill="#fbf9f3"/>

  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">A pipeline is a DAG</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">Three steps — extract rows from a CSV, summarise with an LLM, write a markdown report.</text>
  <line x1="60" y1="100" x2="200" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Input ellipse -->
  <g transform="translate(80, 200)">
    <ellipse cx="70" cy="24" rx="70" ry="24" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2" filter="url(#softShadow)"/>
    <text x="70" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1a1a1a">input.csv</text>
    <text x="70" y="34" text-anchor="middle" font-size="10.5" fill="#5c5c5c" font-style="italic">runtime input</text>
  </g>

  <path d="M 222 224 L 260 224" stroke="#b45309" stroke-width="2.2" fill="none" marker-end="url(#arrAccent)"/>

  <!-- Step 1: extract (python) -->
  <g transform="translate(264, 178)" filter="url(#softShadow)">
    <rect width="180" height="92" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">extract</text>
    <text x="16" y="42" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#b45309" font-weight="700">python</text>
    <line x1="16" y1="50" x2="164" y2="50" stroke="#e6e1d4"/>
    <text x="16" y="68" font-size="11" fill="#3a3a3a">read CSV</text>
    <text x="16" y="82" font-size="11" fill="#3a3a3a">return list[dict]</text>
  </g>

  <path d="M 446 224 L 484 224" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

  <!-- Step 2: summarise (prompt) -->
  <g transform="translate(488, 178)" filter="url(#softShadow)">
    <rect width="180" height="92" rx="8" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">summarise</text>
    <text x="16" y="42" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#b45309" font-weight="700">prompt</text>
    <line x1="16" y1="50" x2="164" y2="50" stroke="#d4c899"/>
    <text x="16" y="68" font-size="11" fill="#3a3a3a">LiteLLM call</text>
    <text x="16" y="82" font-size="11" fill="#3a3a3a">3-bullet summary</text>
  </g>

  <path d="M 670 224 L 708 224" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

  <!-- Step 3: write (run) -->
  <g transform="translate(712, 178)" filter="url(#softShadow)">
    <rect width="180" height="92" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">write</text>
    <text x="16" y="42" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#b45309" font-weight="700">run</text>
    <line x1="16" y1="50" x2="164" y2="50" stroke="#e6e1d4"/>
    <text x="16" y="68" font-size="11" fill="#3a3a3a">shell heredoc</text>
    <text x="16" y="82" font-size="11" fill="#3a3a3a">persist to disk</text>
  </g>

  <path d="M 894 224 L 932 224" stroke="#b45309" stroke-width="2.2" fill="none" marker-end="url(#arrAccent)"/>

  <!-- Output ellipse -->
  <g transform="translate(934, 200)">
    <ellipse cx="70" cy="24" rx="70" ry="24" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2" filter="url(#softShadow)"/>
    <text x="70" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1a1a1a">report.md</text>
    <text x="70" y="34" text-anchor="middle" font-size="10.5" fill="#5c5c5c" font-style="italic">side effect</text>
  </g>

  <!-- Dependency labels under arrows -->
  <text x="235" y="246" text-anchor="middle" font-size="10" fill="#8a8275" font-style="italic">feeds data</text>
  <text x="465" y="246" text-anchor="middle" font-size="10" fill="#8a8275" font-style="italic">depends: [extract]</text>
  <text x="689" y="246" text-anchor="middle" font-size="10" fill="#8a8275" font-style="italic">depends: [summarise]</text>

  <!-- Bottom annotation -->
  <g transform="translate(60, 340)">
    <line x1="0" y1="0" x2="980" y2="0" stroke="#e6e1d4" stroke-width="1"/>
    <text x="0" y="24" font-family="Charter, Georgia, serif" font-size="13" fill="#5c5c5c">
      <tspan font-weight="600" fill="#1a1a1a">Three primitives, three dependencies.</tspan>
      Each step declares what it needs via <tspan font-family="'SF Mono', Menlo, monospace" font-size="12" fill="#1a1a1a">depends:</tspan>.
      aiorch figures out the order.
    </text>
    <text x="0" y="44" font-family="Charter, Georgia, serif" font-size="13" fill="#5c5c5c">
      Two steps with no mutual dependency would land on the same DAG layer and run in parallel — but this chain is strictly sequential.
    </text>
  </g>
</svg>
