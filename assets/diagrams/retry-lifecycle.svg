<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 680"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrInk" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrSuccess" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#2b8a3e"/>
    </marker>
    <marker id="arrFail" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect width="1260" height="680" fill="#f4f5f7"/>

  <text x="70" y="62" font-size="32" font-weight="700" fill="#1e1e1e" letter-spacing="-0.5">Retry lifecycle</text>
  <path d="M 70 82 Q 170 78, 260 82" stroke="#c2410c" stroke-width="3" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="70" y="110" font-size="14" fill="#3f3f46">One step's journey from dispatch to terminal state — with fixed-delay retries and the</text>
  <text x="70" y="132" font-size="14" fill="#3f3f46"><tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13">on_failure</tspan> escape hatch.</text>

  <!-- Start -->
  <g filter="url(#sketch)">
    <circle cx="100" cy="320" r="24" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2"/>
  </g>
  <text x="100" y="327" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">▶</text>
  <text x="100" y="370" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a" text-anchor="middle">dispatched</text>

  <path d="M 126 320 L 188 320" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <!-- Running -->
  <g filter="url(#sketch)">
    <rect x="190" y="280" width="180" height="80" fill="#ffec99" stroke="#1e1e1e" stroke-width="2.5" rx="40"/>
  </g>
  <text x="280" y="312" font-size="18" font-weight="700" fill="#1e1e1e" text-anchor="middle">Running</text>
  <text x="280" y="332" font-size="12" fill="#8b6914" text-anchor="middle">exec in thread</text>
  <text x="280" y="348" font-size="11" fill="#8b6914" text-anchor="middle" font-style="italic">attempt N</text>

  <!-- Success path -->
  <path d="M 370 300 C 430 260, 490 200, 550 180" stroke="#2b8a3e" stroke-width="2" fill="none" marker-end="url(#arrSuccess)" filter="url(#sketch2)"/>
  <text x="420" y="225" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#2b8a3e" font-weight="600">body returned</text>

  <g filter="url(#sketch)">
    <rect x="550" y="140" width="180" height="76" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2.5" rx="38"/>
  </g>
  <text x="640" y="172" font-size="17" font-weight="700" fill="#2b8a3e" text-anchor="middle">Success</text>
  <text x="640" y="190" font-size="11" fill="#2b8a3e" opacity="0.7" text-anchor="middle" font-style="italic">terminal state</text>
  <text x="640" y="206" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#2b8a3e" text-anchor="middle">status = ok</text>

  <!-- Failed path -->
  <path d="M 370 340 C 430 400, 490 450, 550 470" stroke="#c92a2a" stroke-width="2" fill="none" marker-end="url(#arrFail)" filter="url(#sketch2)"/>
  <text x="410" y="420" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#c92a2a" font-weight="600">exception raised</text>

  <g filter="url(#sketch)">
    <rect x="550" y="440" width="180" height="76" fill="#ffc9c9" stroke="#c92a2a" stroke-width="2.5" rx="38"/>
  </g>
  <text x="640" y="472" font-size="17" font-weight="700" fill="#c92a2a" text-anchor="middle">Failed</text>
  <text x="640" y="490" font-size="11" fill="#c92a2a" opacity="0.7" text-anchor="middle" font-style="italic">check retries</text>
  <text x="640" y="506" font-size="11" fill="#c92a2a" text-anchor="middle">attempt N failed</text>

  <!-- Failed → Backoff (if retries remain) -->
  <path d="M 640 440 C 640 410, 690 360, 720 340" stroke="#1e1e1e" stroke-width="1.5" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>
  <text x="660" y="410" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a" font-style="italic">attempts remain</text>

  <!-- Backoff -->
  <g filter="url(#sketch)">
    <rect x="720" y="300" width="180" height="76" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="5 3" rx="38"/>
  </g>
  <text x="810" y="332" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">Backoff</text>
  <text x="810" y="350" font-size="11" fill="#71717a" text-anchor="middle" font-style="italic">sleep retry_delay</text>
  <text x="810" y="366" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a" text-anchor="middle">fixed delay</text>

  <!-- Backoff → Running (loop) -->
  <path d="M 720 310 C 600 260, 450 250, 370 300" stroke="#c2410c" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arrAccent)" filter="url(#sketch2)"/>
  <text x="470" y="260" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#c2410c" font-weight="700">retry</text>

  <!-- Failed → exhausted → fork -->
  <path d="M 732 475 L 880 475" stroke="#c92a2a" stroke-width="1.8" fill="none" marker-end="url(#arrFail)" filter="url(#sketch2)"/>
  <text x="750" y="466" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#71717a" font-style="italic">retries exhausted</text>

  <!-- OnFailure cleanup branch -->
  <g filter="url(#sketch)">
    <rect x="880" y="400" width="200" height="70" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/>
  </g>
  <text x="980" y="424" font-size="14" font-weight="700" fill="#1e1e1e" text-anchor="middle">on_failure cleanup</text>
  <text x="980" y="442" font-size="11" fill="#71717a" text-anchor="middle" font-style="italic">optional step</text>
  <text x="980" y="458" font-size="10.5" fill="#71717a" text-anchor="middle">alert, audit log, ...</text>

  <path d="M 878 458 C 890 440, 900 420, 886 410" stroke="#c92a2a" stroke-width="1.3" fill="none" stroke-dasharray="3 3" marker-end="url(#arrFail)" filter="url(#sketch2)"/>
  <text x="760" y="430" font-size="10" fill="#71717a" font-style="italic">if on_failure</text>

  <!-- StepFailed terminal -->
  <g filter="url(#sketch)">
    <rect x="900" y="500" width="180" height="76" fill="#ffc9c9" stroke="#c92a2a" stroke-width="3" rx="38"/>
  </g>
  <text x="990" y="532" font-size="17" font-weight="700" fill="#c92a2a" text-anchor="middle">Step failed</text>
  <text x="990" y="550" font-size="11" fill="#c92a2a" opacity="0.7" text-anchor="middle" font-style="italic">terminal state</text>
  <text x="990" y="566" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#c92a2a" text-anchor="middle">error re-raised</text>

  <!-- OnFailure → StepFailed -->
  <path d="M 980 472 L 988 498" stroke="#c92a2a" stroke-width="1.3" fill="none" marker-end="url(#arrFail)" filter="url(#sketch2)"/>
  <text x="996" y="490" font-size="10" fill="#71717a" font-style="italic">cleanup done</text>

  <!-- Failed direct to StepFailed (no on_failure) -->
  <path d="M 732 500 C 820 540, 880 550, 900 540" stroke="#c92a2a" stroke-width="1.3" fill="none" stroke-dasharray="3 3" marker-end="url(#arrFail)" filter="url(#sketch2)"/>
  <text x="790" y="562" font-size="10" fill="#71717a" font-style="italic">if no on_failure</text>

  <!-- YAML example panel -->
  <g filter="url(#sketch2)">
    <rect x="80" y="460" width="380" height="195" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" rx="6"/>
  </g>
  <text x="100" y="484" font-size="13" font-weight="700" fill="#1e1e1e">YAML surface</text>
  <line x1="100" y1="492" x2="440" y2="492" stroke="#1e1e1e" stroke-width="1" opacity="0.3"/>
  <g font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" fill="#3f3f46">
    <text x="100" y="514">call_flaky_api:</text>
    <text x="100" y="534">  run: curl --fail https://api...</text>
    <text x="100" y="554">  <tspan fill="#c2410c">retry: 3</tspan></text>
    <text x="100" y="574">  <tspan fill="#c2410c">retry_delay: 2s</tspan></text>
    <text x="100" y="594">  <tspan fill="#c2410c">on_failure: cleanup_step</tspan></text>
    <text x="100" y="614">  <tspan fill="#c2410c">timeout: 30s</tspan></text>
  </g>
  <text x="100" y="640" font-size="11" fill="#71717a" font-style="italic">3 attempts, 2s between each, then escape.</text>
</svg>
