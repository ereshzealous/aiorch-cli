<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 640" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrFail" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#991b1b"/>
    </marker>
    <marker id="arrSuccess" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="640" fill="#fbf9f3"/>

  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">Retry lifecycle</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">One step's journey from dispatch to terminal state — with fixed-delay retries and the <tspan font-family="'SF Mono', Menlo, monospace" font-size="12">on_failure</tspan> escape hatch.</text>
  <line x1="60" y1="100" x2="220" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Start -->
  <g transform="translate(80, 280)">
    <circle cx="30" cy="30" r="22" fill="#1a1a1a"/>
    <text x="30" y="35" text-anchor="middle" font-size="16" fill="#fbf9f3" font-weight="700">▶</text>
    <text x="30" y="84" text-anchor="middle" font-size="10.5" fill="#5c5c5c" font-family="'SF Mono', Menlo, monospace">dispatched</text>
  </g>

  <path d="M 134 310 L 188 310" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

  <!-- Running state -->
  <g transform="translate(192, 270)" filter="url(#softShadow)">
    <rect width="180" height="80" rx="40" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.8"/>
    <text x="90" y="34" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="16" font-weight="700" fill="#1a1a1a">Running</text>
    <text x="90" y="54" text-anchor="middle" font-size="11" fill="#8a8275" font-style="italic">exec in thread</text>
    <text x="90" y="70" text-anchor="middle" font-size="11" fill="#5c5c5c">one attempt</text>
  </g>

  <!-- Success path -->
  <path d="M 372 294 C 430 294, 480 160, 540 160" stroke="#166534" stroke-width="2" fill="none" marker-end="url(#arrSuccess)"/>
  <text x="420" y="218" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#166534">body returned</text>

  <!-- Success state -->
  <g transform="translate(540, 124)" filter="url(#softShadow)">
    <rect width="180" height="74" rx="37" fill="#dcfce7" stroke="#166534" stroke-width="1.6"/>
    <text x="90" y="30" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="15" font-weight="700" fill="#166534">Success</text>
    <text x="90" y="48" text-anchor="middle" font-size="11" fill="#16653480" font-style="italic">terminal state</text>
    <text x="90" y="64" text-anchor="middle" font-size="10.5" fill="#166534" font-family="'SF Mono', Menlo, monospace">status = ok</text>
  </g>

  <!-- Failure path -->
  <path d="M 372 326 C 430 326, 480 450, 540 450" stroke="#991b1b" stroke-width="2" fill="none" marker-end="url(#arrFail)"/>
  <text x="410" y="418" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#991b1b">exception raised</text>

  <!-- Failed (transient) -->
  <g transform="translate(540, 414)" filter="url(#softShadow)">
    <rect width="180" height="74" rx="37" fill="#fee2e2" stroke="#991b1b" stroke-width="1.6"/>
    <text x="90" y="30" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="15" font-weight="700" fill="#991b1b">Failed</text>
    <text x="90" y="48" text-anchor="middle" font-size="11" fill="#991b1b80" font-style="italic">attempt N</text>
    <text x="90" y="64" text-anchor="middle" font-size="10.5" fill="#991b1b">check retries</text>
  </g>

  <!-- Branch: retry remaining → Backoff -->
  <path d="M 628 414 C 628 370, 680 330, 710 330" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrInk)"/>
  <text x="638" y="386" font-family="Charter, Georgia, serif" font-size="11" font-style="italic" fill="#5c5c5c">attempts remaining</text>

  <!-- Backoff state -->
  <g transform="translate(712, 288)" filter="url(#softShadow)">
    <rect width="180" height="80" rx="40" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.6" stroke-dasharray="5 3"/>
    <text x="90" y="30" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="15" font-weight="700" fill="#1a1a1a">Backoff</text>
    <text x="90" y="48" text-anchor="middle" font-size="11" fill="#8a8275" font-style="italic">sleep retry_delay</text>
    <text x="90" y="66" text-anchor="middle" font-size="10.5" fill="#5c5c5c" font-family="'SF Mono', Menlo, monospace">fixed, not exponential</text>
  </g>

  <!-- Backoff → Running (retry loop) -->
  <path d="M 716 294 C 610 240, 450 220, 372 286" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrAccent)" stroke-dasharray="6 3"/>
  <text x="470" y="248" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#b45309" font-weight="600">retry</text>

  <!-- Branch: exhausted → 2 states (OnFailure OR StepFailed) -->
  <!-- From Failed state, second branch going right -->
  <path d="M 720 450 L 928 450" stroke="#991b1b" stroke-width="1.5" fill="none" marker-end="url(#arrFail)"/>
  <text x="760" y="442" font-family="Charter, Georgia, serif" font-size="11" font-style="italic" fill="#5c5c5c">retries exhausted</text>

  <!-- Fork at the end: with on_failure vs without -->
  <!-- OnFailure (top) -->
  <g transform="translate(932, 360)" filter="url(#softShadow)">
    <rect width="180" height="74" rx="10" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="90" y="26" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">on_failure cleanup</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#8a8275" font-style="italic">optional step</text>
    <text x="90" y="60" text-anchor="middle" font-size="10.5" fill="#5c5c5c">alert, write audit log, …</text>
  </g>

  <!-- Arrow from Failed→OnFailure (top branch, conditional) -->
  <path d="M 908 440 C 928 420, 940 400, 960 395" stroke="#991b1b" stroke-width="1.3" fill="none" stroke-dasharray="3 3" marker-end="url(#arrFail)"/>
  <text x="920" y="380" font-size="9.5" font-style="italic" fill="#5c5c5c">if on_failure defined</text>

  <!-- StepFailed terminal -->
  <g transform="translate(1000, 460)" filter="url(#softShadow)">
    <rect width="180" height="80" rx="40" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
    <text x="90" y="32" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="15" font-weight="700" fill="#991b1b">Step failed</text>
    <text x="90" y="52" text-anchor="middle" font-size="11" fill="#991b1b80" font-style="italic">terminal state</text>
    <text x="90" y="70" text-anchor="middle" font-size="10.5" fill="#991b1b" font-family="'SF Mono', Menlo, monospace">error re-raised</text>
  </g>

  <!-- OnFailure → StepFailed -->
  <path d="M 1022 434 C 1070 440, 1085 452, 1090 458" stroke="#991b1b" stroke-width="1.3" fill="none" marker-end="url(#arrFail)"/>
  <text x="1030" y="448" font-size="9.5" font-style="italic" fill="#5c5c5c">cleanup done</text>

  <!-- Arrow from Failed (direct, no on_failure) -->
  <path d="M 720 472 C 850 490, 920 490, 1000 490" stroke="#991b1b" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrFail)"/>
  <text x="810" y="510" font-size="9.5" font-style="italic" fill="#5c5c5c">if no on_failure</text>

  <!-- YAML example panel -->
  <g transform="translate(80, 430)">
    <rect width="400" height="180" rx="8" fill="#ffffff" stroke="#e6e1d4" stroke-width="1"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="13" font-weight="600" fill="#1a1a1a">YAML surface</text>
    <line x1="16" y1="32" x2="384" y2="32" stroke="#e6e1d4"/>
    <g font-family="'SF Mono', Menlo, monospace" font-size="11.5" fill="#3a3a3a">
      <text x="16" y="54">call_flaky_api:</text>
      <text x="16" y="72">  run: curl --fail https://api...</text>
      <text x="16" y="90">  <tspan fill="#b45309">retry: 3</tspan></text>
      <text x="16" y="108">  <tspan fill="#b45309">retry_delay: 2s</tspan></text>
      <text x="16" y="126">  <tspan fill="#b45309">on_failure: cleanup_step</tspan></text>
      <text x="16" y="144">  <tspan fill="#b45309">timeout: 30s</tspan></text>
    </g>
    <text x="16" y="168" font-size="10.5" fill="#5c5c5c" font-style="italic">3 attempts, 2s between each, then escape.</text>
  </g>
</svg>
