<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 700"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrInk" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#1e1e1e"/>
    </marker>
  </defs>

  <rect width="1260" height="700" fill="#f4f5f7"/>

  <text x="70" y="62" font-size="32" font-weight="700" fill="#1e1e1e" letter-spacing="-0.5">Run lifecycle</text>
  <path d="M 70 82 Q 160 78, 250 82" stroke="#c2410c" stroke-width="3" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="70" y="108" font-size="14" fill="#3f3f46">Compact view — from YAML on disk to a recorded, replayable run.</text>

  <!-- Horizontal backbone -->
  <g filter="url(#sketch)">
    <rect x="70" y="160" width="180" height="80" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" rx="6"/>
  </g>
  <text x="90" y="190" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="14" font-weight="600" fill="#1e1e1e">pipeline.yaml</text>
  <text x="90" y="212" font-size="11" fill="#3f3f46">the declaration</text>
  <text x="90" y="228" font-size="11" fill="#3f3f46">+ CLI overrides</text>

  <path d="M 252 200 L 288 200" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <g filter="url(#sketch)">
    <rect x="290" y="160" width="170" height="80" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2.5" rx="6"/>
  </g>
  <text x="310" y="190" font-size="16" font-weight="700" fill="#1e1e1e">Parser</text>
  <text x="310" y="210" font-size="11" fill="#3f3f46">3-layer validate</text>
  <text x="310" y="226" font-size="11" fill="#3f3f46">schema · types · DAG</text>

  <path d="M 462 200 L 498 200" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <g filter="url(#sketch)">
    <rect x="500" y="160" width="170" height="80" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2.5" rx="6"/>
  </g>
  <text x="520" y="190" font-size="16" font-weight="700" fill="#1e1e1e">DAG builder</text>
  <text x="520" y="210" font-size="11" fill="#3f3f46">resolves depends:</text>
  <text x="520" y="226" font-size="11" fill="#3f3f46">assigns layers</text>

  <path d="M 672 200 L 708 200" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <g filter="url(#sketch)">
    <rect x="710" y="150" width="200" height="100" fill="#ffec99" stroke="#1e1e1e" stroke-width="3" rx="6"/>
  </g>
  <text x="730" y="182" font-size="18" font-weight="700" fill="#1e1e1e">Executor</text>
  <text x="730" y="205" font-size="11" fill="#8b6914">walks DAG layer by layer</text>
  <text x="730" y="223" font-size="11" fill="#8b6914">retries, timeouts</text>
  <text x="730" y="240" font-size="11" fill="#8b6914">on_failure cleanup</text>

  <path d="M 912 200 L 948 200" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <g filter="url(#sketch)">
    <polygon points="1030,170 1110,200 1030,230 950,200" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  </g>
  <text x="1030" y="197" font-size="12" font-weight="700" fill="#1e1e1e" text-anchor="middle">Primitive</text>
  <text x="1030" y="212" font-size="12" font-weight="700" fill="#1e1e1e" text-anchor="middle">dispatcher</text>

  <!-- Primitives fan out down from dispatcher -->
  <g stroke="#1e1e1e" stroke-width="1.4" fill="none" filter="url(#sketch2)">
    <path d="M 990 230 C 900 260, 300 280, 170 310"/>
    <path d="M 1005 230 C 940 260, 500 285, 350 310"/>
    <path d="M 1025 230 L 530 310"/>
    <path d="M 1040 230 C 1050 260, 900 290, 710 310"/>
    <path d="M 1055 230 C 1080 260, 1010 290, 890 310"/>
    <path d="M 1070 230 C 1100 260, 1120 290, 1070 310"/>
  </g>

  <!-- 6 primitive cards in a row -->
  <g filter="url(#sketch2)">
    <rect x="90" y="315" width="160" height="80" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
    <rect x="90" y="315" width="160" height="24" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="105" y="332" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1e1e1e">prompt</text>
  <text x="105" y="358" font-size="11" fill="#1e1e1e">LiteLLM call</text>
  <text x="105" y="376" font-size="10" fill="#71717a">any provider</text>

  <g filter="url(#sketch2)">
    <rect x="270" y="315" width="160" height="80" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
    <rect x="270" y="315" width="160" height="24" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="285" y="332" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1e1e1e">python</text>
  <text x="285" y="358" font-size="11" fill="#1e1e1e">exec in thread</text>
  <text x="285" y="376" font-size="10" fill="#71717a">your Python env</text>

  <g filter="url(#sketch2)">
    <rect x="450" y="315" width="160" height="80" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
    <rect x="450" y="315" width="160" height="24" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="465" y="332" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1e1e1e">run</text>
  <text x="465" y="358" font-size="11" fill="#1e1e1e">shell subprocess</text>
  <text x="465" y="376" font-size="10" fill="#71717a">your $PATH</text>

  <g filter="url(#sketch2)">
    <rect x="630" y="315" width="160" height="80" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
    <rect x="630" y="315" width="160" height="24" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="645" y="332" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1e1e1e">flow</text>
  <text x="645" y="358" font-size="11" fill="#1e1e1e">sub-pipeline</text>
  <text x="645" y="376" font-size="10" fill="#71717a">recursive</text>

  <g filter="url(#sketch2)">
    <rect x="810" y="315" width="160" height="80" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
    <rect x="810" y="315" width="160" height="24" fill="#ffec99" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="825" y="332" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1e1e1e">foreach</text>
  <text x="825" y="358" font-size="11" fill="#1e1e1e">fan over list</text>
  <text x="825" y="376" font-size="10" fill="#71717a">parallel: true</text>

  <g filter="url(#sketch2)">
    <rect x="990" y="315" width="170" height="80" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
    <rect x="990" y="315" width="170" height="24" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="1005" y="332" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#1e1e1e">condition</text>
  <text x="1005" y="358" font-size="11" fill="#1e1e1e">gate the step</text>
  <text x="1005" y="376" font-size="10" fill="#71717a">skipped ≠ failed</text>

  <!-- Dashed lines down to SQLite -->
  <g stroke="#71717a" stroke-width="1" stroke-dasharray="4 3" fill="none" filter="url(#sketch2)">
    <path d="M 170 395 C 200 450, 500 480, 590 500"/>
    <path d="M 350 395 C 380 450, 560 480, 610 500"/>
    <path d="M 530 395 L 630 500"/>
    <path d="M 710 395 C 680 450, 660 480, 650 500"/>
    <path d="M 890 395 C 800 450, 700 480, 670 500"/>
    <path d="M 1075 395 C 900 450, 720 480, 690 500"/>
  </g>

  <!-- SQLite cylinder -->
  <g filter="url(#sketch)">
    <ellipse cx="630" cy="510" rx="140" ry="12" fill="#3f3f46" stroke="#1e1e1e" stroke-width="2"/>
    <rect x="490" y="510" width="280" height="70" fill="#3f3f46" stroke="#1e1e1e" stroke-width="2"/>
    <ellipse cx="630" cy="580" rx="140" ry="12" fill="#27272a" stroke="#1e1e1e" stroke-width="2"/>
  </g>
  <text x="630" y="538" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">SQLite</text>
  <text x="630" y="558" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#d4d4d8" text-anchor="middle">~/.aiorch/history.db</text>
  <text x="630" y="574" font-size="10" fill="#a1a1aa" text-anchor="middle">runs · steps · llm_cache</text>

  <path d="M 630 592 L 630 622" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <g filter="url(#sketch2)">
    <rect x="400" y="625" width="460" height="46" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="420" y="654" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="14" fill="#1e1e1e">
    <tspan font-weight="700" fill="#c2410c">aiorch</tspan> history · <tspan font-weight="700" fill="#c2410c">aiorch</tspan> trace · <tspan font-weight="700" fill="#c2410c">aiorch</tspan> resume
  </text>
</svg>
