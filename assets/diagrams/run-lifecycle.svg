<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 640" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="640" fill="#fbf9f3"/>

  <!-- Title -->
  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">Run lifecycle</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">From YAML on disk to a recorded, replayable run — the six hops every invocation makes.</text>
  <line x1="60" y1="100" x2="200" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Main backbone -->
  <g transform="translate(60, 150)">
    <!-- pipeline.yaml -->
    <g filter="url(#softShadow)">
      <rect width="150" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
      <text x="14" y="26" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#1a1a1a">pipeline.yaml</text>
      <text x="14" y="46" font-size="11" fill="#5c5c5c">the declarative</text>
      <text x="14" y="58" font-size="11" fill="#5c5c5c">description</text>
    </g>

    <path d="M 152 32 L 192 32" stroke="#b45309" stroke-width="2.2" fill="none" marker-end="url(#arrAccent)"/>

    <!-- Parser -->
    <g transform="translate(200, 0)" filter="url(#softShadow)">
      <rect width="150" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
      <text x="14" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">Parser</text>
      <text x="14" y="42" font-size="11" fill="#8a8275" font-style="italic">3-layer validate</text>
      <text x="14" y="58" font-size="11" fill="#5c5c5c">schema · types · semantics</text>
    </g>

    <path d="M 352 32 L 392 32" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

    <!-- DAG builder -->
    <g transform="translate(400, 0)" filter="url(#softShadow)">
      <rect width="150" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
      <text x="14" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">DAG builder</text>
      <text x="14" y="42" font-size="11" fill="#8a8275" font-style="italic">resolve depends:</text>
      <text x="14" y="58" font-size="11" fill="#5c5c5c">layers parallel steps</text>
    </g>

    <path d="M 552 32 L 592 32" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

    <!-- Executor (highlighted) -->
    <g transform="translate(600, -6)" filter="url(#softShadow)">
      <rect width="170" height="76" rx="8" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.8"/>
      <text x="14" y="26" font-family="Charter, Georgia, serif" font-size="15" font-weight="700" fill="#1a1a1a">Executor</text>
      <text x="14" y="44" font-size="11" fill="#8a8275" font-style="italic">walks each layer</text>
      <text x="14" y="60" font-size="11" fill="#5c5c5c">retries · timeouts · on_failure</text>
    </g>

    <path d="M 772 32 L 815 32" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

    <!-- Dispatcher diamond -->
    <g transform="translate(820, 0)">
      <polygon points="80,0 160,32 80,64 0,32" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" filter="url(#softShadow)"/>
      <text x="80" y="28" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="12" font-weight="600" fill="#1a1a1a">Primitive</text>
      <text x="80" y="44" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="12" font-weight="600" fill="#1a1a1a">dispatcher</text>
    </g>
  </g>

  <!-- Primitive fan-out -->
  <g>
    <!-- connector lines from dispatcher down to each primitive -->
    <g stroke="#1a1a1a" stroke-width="1.2" fill="none">
      <path d="M 960 246 C 960 290, 130 290, 130 310"/>
      <path d="M 960 246 C 960 290, 320 290, 320 310"/>
      <path d="M 960 246 C 960 290, 510 290, 510 310"/>
      <path d="M 960 246 C 960 290, 700 290, 700 310"/>
      <path d="M 960 246 C 960 290, 890 290, 890 310"/>
      <path d="M 960 246 L 960 310"/>
    </g>

    <!-- prompt -->
    <g transform="translate(60, 312)">
      <rect width="140" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="12" y="22" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">prompt</text>
      <text x="12" y="40" font-size="11" fill="#3a3a3a">LiteLLM call</text>
      <text x="12" y="56" font-size="10.5" fill="#5c5c5c">any provider · cached</text>
    </g>

    <!-- python -->
    <g transform="translate(250, 312)">
      <rect width="140" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="12" y="22" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">python</text>
      <text x="12" y="40" font-size="11" fill="#3a3a3a">exec in thread</text>
      <text x="12" y="56" font-size="10.5" fill="#5c5c5c">your Python env</text>
    </g>

    <!-- run -->
    <g transform="translate(440, 312)">
      <rect width="140" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="12" y="22" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">run</text>
      <text x="12" y="40" font-size="11" fill="#3a3a3a">shell subprocess</text>
      <text x="12" y="56" font-size="10.5" fill="#5c5c5c">your $PATH</text>
    </g>

    <!-- flow -->
    <g transform="translate(630, 312)">
      <rect width="140" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="12" y="22" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">flow</text>
      <text x="12" y="40" font-size="11" fill="#3a3a3a">sub-pipeline</text>
      <text x="12" y="56" font-size="10.5" fill="#5c5c5c">parser + executor</text>
    </g>

    <!-- foreach -->
    <g transform="translate(820, 312)">
      <rect width="140" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="12" y="22" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">foreach</text>
      <text x="12" y="40" font-size="11" fill="#3a3a3a">fan over list</text>
      <text x="12" y="56" font-size="10.5" fill="#5c5c5c">parallel: true</text>
    </g>

    <!-- condition -->
    <g transform="translate(1010, 312)">
      <rect width="170" height="64" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="12" y="22" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">condition</text>
      <text x="12" y="40" font-size="11" fill="#3a3a3a">gate on boolean</text>
      <text x="12" y="56" font-size="10.5" fill="#5c5c5c">skipped is not failed</text>
    </g>
  </g>

  <!-- Dashed lines from primitives down to SQLite -->
  <g stroke="#475569" stroke-width="1" stroke-dasharray="3 3" fill="none">
    <path d="M 130 378 C 130 420, 530 430, 620 465"/>
    <path d="M 320 378 C 320 420, 540 425, 620 465"/>
    <path d="M 510 378 L 620 465"/>
    <path d="M 700 378 C 700 420, 640 430, 620 465"/>
    <path d="M 890 378 C 890 420, 700 430, 620 465"/>
    <path d="M 1095 378 C 1095 420, 800 430, 620 465"/>
  </g>

  <!-- SQLite cylinder -->
  <g transform="translate(480, 470)">
    <ellipse cx="140" cy="8" rx="140" ry="8" fill="#0f4c75"/>
    <rect x="0" y="8" width="280" height="60" fill="#0f4c75"/>
    <ellipse cx="140" cy="68" rx="140" ry="8" fill="#0a3957"/>
    <text x="140" y="32" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#ffffff">SQLite · history.db</text>
    <text x="140" y="52" text-anchor="middle" font-size="11" fill="#b0d4e8">runs · steps · llm_cache</text>
  </g>

  <!-- Arrow to replay -->
  <path d="M 620 555 L 620 583" stroke="#1a1a1a" stroke-width="1.6" fill="none" marker-end="url(#arrInk)"/>

  <g transform="translate(440, 586)">
    <rect width="360" height="32" rx="5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
    <text x="16" y="21" font-family="'SF Mono', Menlo, monospace" font-size="12" fill="#1a1a1a">
      <tspan font-weight="700" fill="#b45309">aiorch</tspan> history  ·  <tspan font-weight="700" fill="#b45309">aiorch</tspan> trace  ·  <tspan font-weight="700" fill="#b45309">aiorch</tspan> resume
    </text>
  </g>

  <!-- Side annotations -->
  <text x="1000" y="178" font-family="Charter, Georgia, serif" font-size="11.5" font-style="italic" fill="#5c5c5c">
    <tspan x="1000" dy="0">the only stage</tspan>
    <tspan x="1000" dy="14">that holds state</tspan>
    <tspan x="1000" dy="14">across time</tspan>
  </text>
  <path d="M 990 182 Q 945 180, 785 180" fill="none" stroke="#9a9283" stroke-width="0.8"/>
</svg>
