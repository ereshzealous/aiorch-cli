<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrSkip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a8a296"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="560" fill="#fbf9f3"/>

  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">Classify &amp; branch</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">A classifier step decides which branch runs. The other branches show as <tspan font-style="italic">skipped</tspan> in the trace, not <tspan font-style="italic">failed</tspan>.</text>
  <line x1="60" y1="100" x2="220" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Input -->
  <g transform="translate(100, 236)" filter="url(#softShadow)">
    <ellipse cx="80" cy="24" rx="80" ry="24" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="80" y="22" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="600">ticket_text</text>
    <text x="80" y="36" text-anchor="middle" font-size="10.5" fill="#5c5c5c" font-style="italic">runtime input</text>
  </g>

  <path d="M 262 260 L 300 260" stroke="#b45309" stroke-width="2.2" fill="none" marker-end="url(#arrAccent)"/>

  <!-- Classifier diamond (bigger) -->
  <g transform="translate(306, 200)">
    <polygon points="110,0 220,60 110,120 0,60" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.8" filter="url(#softShadow)"/>
    <text x="110" y="48" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="15" font-weight="700" fill="#1a1a1a">classify</text>
    <text x="110" y="66" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#b45309">prompt</text>
    <text x="110" y="82" text-anchor="middle" font-size="10.5" fill="#5c5c5c">bug | feature | question</text>
  </g>

  <!-- Arrow to bug branch (RUNS) -->
  <path d="M 528 232 C 580 200, 640 160, 700 160" stroke="#b45309" stroke-width="2.2" fill="none" marker-end="url(#arrAccent)"/>
  <text x="560" y="186" font-size="11" fill="#b45309" font-family="'SF Mono', Menlo, monospace" font-weight="600">category == "bug"</text>

  <!-- Arrow to feature branch (skipped) -->
  <path d="M 528 260 L 700 260" stroke="#a8a296" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrSkip)"/>
  <text x="560" y="252" font-size="11" fill="#a8a296" font-family="'SF Mono', Menlo, monospace">category == "feature"</text>

  <!-- Arrow to question branch (skipped) -->
  <path d="M 528 290 C 580 320, 640 360, 700 360" stroke="#a8a296" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrSkip)"/>
  <text x="560" y="356" font-size="11" fill="#a8a296" font-family="'SF Mono', Menlo, monospace">category == "question"</text>

  <!-- Bug branch (filled — runs) -->
  <g transform="translate(700, 128)" filter="url(#softShadow)">
    <rect width="200" height="64" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">handle_bug</text>
    <text x="16" y="42" font-size="11" fill="#b45309" font-style="italic">RUNS · creates Jira ticket</text>
    <text x="16" y="58" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#5c5c5c">trace: status = ok</text>
  </g>

  <!-- Feature branch (dashed — skipped) -->
  <g transform="translate(700, 228)">
    <rect width="200" height="64" rx="8" fill="#faf7ee" stroke="#a8a296" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="500" fill="#8a8275">handle_feature</text>
    <text x="16" y="42" font-size="11" fill="#a8a296" font-style="italic">SKIPPED · body never runs</text>
    <text x="16" y="58" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#a8a296">trace: status = skipped</text>
  </g>

  <!-- Question branch (dashed — skipped) -->
  <g transform="translate(700, 328)">
    <rect width="200" height="64" rx="8" fill="#faf7ee" stroke="#a8a296" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="500" fill="#8a8275">handle_question</text>
    <text x="16" y="42" font-size="11" fill="#a8a296" font-style="italic">SKIPPED · body never runs</text>
    <text x="16" y="58" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#a8a296">trace: status = skipped</text>
  </g>

  <!-- Arrow from bug to summarize -->
  <path d="M 904 160 C 960 160, 990 240, 990 252" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrInk)"/>

  <!-- Dashed arrows from skipped branches to summarize (showing they don't contribute) -->
  <path d="M 904 260 L 998 262" stroke="#a8a296" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
  <path d="M 904 360 C 960 360, 990 290, 990 276" stroke="#a8a296" stroke-width="1" fill="none" stroke-dasharray="3 3"/>

  <!-- Summarize merge -->
  <g transform="translate(1000, 232)" filter="url(#softShadow)">
    <rect width="160" height="64" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">summarize</text>
    <text x="16" y="42" font-size="11" fill="#5c5c5c" font-style="italic">pulls only from</text>
    <text x="16" y="58" font-size="11" fill="#5c5c5c" font-style="italic">the branch that ran</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#e6e1d4" stroke-width="1"/>

    <g transform="translate(0, 18)">
      <rect width="24" height="14" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
      <text x="34" y="11" font-size="11.5" fill="#3a3a3a">solid · step ran, output is available to downstream <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">depends:</tspan></text>
    </g>

    <g transform="translate(0, 44)">
      <rect width="24" height="14" fill="#faf7ee" stroke="#a8a296" stroke-width="1.2" stroke-dasharray="3 2"/>
      <text x="34" y="11" font-size="11.5" fill="#3a3a3a">dashed · step skipped because its <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">condition:</tspan> evaluated false. Never failed — just not executed.</text>
    </g>

    <text x="0" y="90" font-family="Charter, Georgia, serif" font-size="12" font-style="italic" fill="#5c5c5c">
      The distinction matters: a failed upstream step causes its <tspan font-family="'SF Mono', Menlo, monospace" font-size="11">depends:</tspan> children to fail too. A skipped step does not — it's a graceful no-op.
    </text>
  </g>
</svg>
