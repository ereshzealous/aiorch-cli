<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 580"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrInk" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrSkip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a1a1aa"/>
    </marker>
  </defs>

  <rect width="1220" height="580" fill="#f4f5f7"/>

  <text x="70" y="62" font-size="32" font-weight="700" fill="#1e1e1e" letter-spacing="-0.5">Classify &amp; branch</text>
  <path d="M 70 82 Q 180 78, 280 82" stroke="#c2410c" stroke-width="3" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="70" y="110" font-size="14" fill="#3f3f46">A classifier step decides which branch runs. Other branches show as <tspan font-style="italic">skipped</tspan> in the trace —</text>
  <text x="70" y="132" font-size="14" fill="#3f3f46">explicitly not <tspan font-style="italic">failed</tspan>.</text>

  <!-- input -->
  <g filter="url(#sketch)">
    <ellipse cx="130" cy="280" rx="75" ry="30" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  </g>
  <text x="130" y="278" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#1e1e1e" text-anchor="middle">ticket_text</text>
  <text x="130" y="294" font-size="11" fill="#71717a" text-anchor="middle">runtime input</text>

  <path d="M 208 280 L 244 280" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <!-- classifier diamond -->
  <g filter="url(#sketch)">
    <polygon points="360,220 470,280 360,340 250,280" fill="#ffec99" stroke="#1e1e1e" stroke-width="2.5"/>
  </g>
  <text x="360" y="270" font-size="16" font-weight="700" fill="#1e1e1e" text-anchor="middle">classify</text>
  <text x="360" y="290" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" font-weight="700" fill="#c2410c" text-anchor="middle">prompt</text>
  <text x="360" y="306" font-size="10.5" fill="#3f3f46" text-anchor="middle">bug | feature | question</text>

  <!-- Branch 1: bug (RUNS) -->
  <path d="M 476 255 C 550 230, 630 205, 700 195" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>
  <text x="520" y="216" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#c2410c">category == "bug"</text>

  <g filter="url(#sketch)">
    <rect x="700" y="172" width="220" height="72" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5" rx="5"/>
    <rect x="700" y="172" width="220" height="24" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2.5" rx="5"/>
  </g>
  <text x="718" y="189" font-size="14" font-weight="700" fill="#1e1e1e">handle_bug</text>
  <text x="880" y="189" font-size="10.5" font-weight="700" fill="#c2410c" text-anchor="end">RUNS</text>
  <text x="718" y="215" font-size="12" fill="#1e1e1e">creates Jira ticket</text>
  <text x="718" y="232" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a">trace: status = ok</text>

  <!-- Branch 2: feature (skipped) -->
  <path d="M 476 280 L 700 280" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrSkip)" filter="url(#sketch2)"/>
  <text x="520" y="272" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#a1a1aa">category == "feature"</text>

  <g filter="url(#sketch)">
    <rect x="700" y="260" width="220" height="72" fill="#fafaf7" stroke="#a1a1aa" stroke-width="1.5" stroke-dasharray="4 3" rx="5"/>
    <rect x="700" y="260" width="220" height="24" fill="#e4e4e7" stroke="#a1a1aa" stroke-width="1.5" stroke-dasharray="4 3" rx="5"/>
  </g>
  <text x="718" y="277" font-size="14" font-weight="500" fill="#8a8a91">handle_feature</text>
  <text x="880" y="277" font-size="10.5" font-weight="700" fill="#a1a1aa" text-anchor="end">SKIPPED</text>
  <text x="718" y="303" font-size="12" fill="#a1a1aa" font-style="italic">body never runs</text>
  <text x="718" y="320" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#a1a1aa">trace: status = skipped</text>

  <!-- Branch 3: question (skipped) -->
  <path d="M 476 305 C 550 330, 630 355, 700 365" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrSkip)" filter="url(#sketch2)"/>
  <text x="520" y="374" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#a1a1aa">category == "question"</text>

  <g filter="url(#sketch)">
    <rect x="700" y="348" width="220" height="72" fill="#fafaf7" stroke="#a1a1aa" stroke-width="1.5" stroke-dasharray="4 3" rx="5"/>
    <rect x="700" y="348" width="220" height="24" fill="#e4e4e7" stroke="#a1a1aa" stroke-width="1.5" stroke-dasharray="4 3" rx="5"/>
  </g>
  <text x="718" y="365" font-size="14" font-weight="500" fill="#8a8a91">handle_question</text>
  <text x="880" y="365" font-size="10.5" font-weight="700" fill="#a1a1aa" text-anchor="end">SKIPPED</text>
  <text x="718" y="391" font-size="12" fill="#a1a1aa" font-style="italic">body never runs</text>
  <text x="718" y="408" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#a1a1aa">trace: status = skipped</text>

  <!-- Merge → summarize -->
  <path d="M 922 208 C 980 210, 1020 270, 1020 278" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>
  <path d="M 922 296 L 1020 292" stroke="#a1a1aa" stroke-width="1" fill="none" stroke-dasharray="3 3" filter="url(#sketch2)"/>
  <path d="M 922 384 C 980 380, 1020 320, 1020 306" stroke="#a1a1aa" stroke-width="1" fill="none" stroke-dasharray="3 3" filter="url(#sketch2)"/>

  <g filter="url(#sketch)">
    <rect x="1020" y="258" width="170" height="60" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5" rx="5"/>
  </g>
  <text x="1040" y="282" font-size="14" font-weight="700" fill="#1e1e1e">summarize</text>
  <text x="1040" y="300" font-size="11" fill="#71717a" font-style="italic">pulls only from</text>
  <text x="1040" y="314" font-size="11" fill="#71717a" font-style="italic">the branch that ran</text>

  <!-- Legend -->
  <line x1="70" y1="470" x2="1150" y2="470" stroke="#d4d4d8" stroke-width="1" filter="url(#sketch2)"/>
  <g transform="translate(70, 492)">
    <rect width="24" height="14" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
    <text x="34" y="12" font-size="13" fill="#3f3f46"><tspan font-weight="600" fill="#1e1e1e">solid</tspan> — step ran, output is available to downstream <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12">depends:</tspan></text>
  </g>
  <g transform="translate(70, 518)">
    <rect width="24" height="14" fill="#fafaf7" stroke="#a1a1aa" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="34" y="12" font-size="13" fill="#3f3f46"><tspan font-weight="600" fill="#1e1e1e">dashed</tspan> — step skipped because its <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12">condition:</tspan> evaluated false. Never failed.</text>
  </g>
  <text x="70" y="558" font-size="12" fill="#71717a" font-style="italic">
    A failed upstream causes <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11">depends:</tspan> children to fail too. A skipped step does not — it's a graceful no-op.
  </text>
</svg>
