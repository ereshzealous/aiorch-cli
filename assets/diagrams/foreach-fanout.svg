<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 560"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrInk" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#1e1e1e"/>
    </marker>
  </defs>

  <rect width="1220" height="560" fill="#f4f5f7"/>

  <text x="70" y="62" font-size="32" font-weight="700" fill="#1e1e1e" letter-spacing="-0.5">Foreach fan-out</text>
  <path d="M 70 82 Q 180 78, 280 82" stroke="#c2410c" stroke-width="3" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="70" y="110" font-size="14" fill="#3f3f46">A step declares <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12">foreach: &lt;list&gt;</tspan> and expands into N sibling steps at dispatch time.</text>
  <text x="70" y="132" font-size="14" fill="#3f3f46">With <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12">parallel: true</tspan>, all N overlap.</text>

  <!-- source -->
  <g filter="url(#sketch)">
    <rect x="80" y="250" width="210" height="100" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" rx="6"/>
  </g>
  <text x="100" y="282" font-size="18" font-weight="700" fill="#1e1e1e">source</text>
  <text x="100" y="304" font-size="12" fill="#3f3f46">any primitive</text>
  <line x1="100" y1="314" x2="270" y2="314" stroke="#1e1e1e" stroke-width="1" opacity="0.3"/>
  <text x="100" y="332" font-size="12" fill="#1e1e1e">returns a list of N items</text>
  <text x="100" y="346" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a">result = [...]</text>

  <path d="M 292 300 L 328 300" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <!-- foreach gate -->
  <g filter="url(#sketch)">
    <polygon points="330,280 370,260 460,260 500,280 460,320 370,320" fill="#ffec99" stroke="#1e1e1e" stroke-width="2.5"/>
  </g>
  <text x="415" y="290" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#c2410c" text-anchor="middle">foreach</text>
  <text x="415" y="308" font-size="10.5" fill="#3f3f46" text-anchor="middle">for item in list</text>

  <!-- connectors from foreach to cards -->
  <g stroke="#1e1e1e" stroke-width="1.4" fill="none" filter="url(#sketch2)">
    <path d="M 502 282 C 540 220, 620 195, 680 180"/>
    <path d="M 502 290 L 680 275"/>
    <path d="M 502 300 L 680 355"/>
    <path d="M 502 310 C 540 380, 620 430, 680 450"/>
  </g>

  <!-- process cards -->
  <g filter="url(#sketch)">
    <rect x="680" y="160" width="200" height="70" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="696" y="186" font-size="14" font-weight="700" fill="#1e1e1e">process <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13" fill="#c2410c">[0]</tspan></text>
  <text x="696" y="208" font-size="12" fill="#3f3f46">runs with item[0]</text>
  <text x="696" y="224" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a">{{item}}</text>

  <g filter="url(#sketch)">
    <rect x="680" y="250" width="200" height="70" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="696" y="276" font-size="14" font-weight="700" fill="#1e1e1e">process <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13" fill="#c2410c">[1]</tspan></text>
  <text x="696" y="298" font-size="12" fill="#3f3f46">runs with item[1]</text>
  <text x="696" y="314" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a">parallel: true</text>

  <g filter="url(#sketch)">
    <rect x="680" y="340" width="200" height="70" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="5"/>
  </g>
  <text x="696" y="366" font-size="14" font-weight="700" fill="#1e1e1e">process <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13" fill="#c2410c">[2]</tspan></text>
  <text x="696" y="388" font-size="12" fill="#3f3f46">runs with item[2]</text>
  <text x="696" y="404" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10.5" fill="#71717a">concurrency: N</text>

  <g filter="url(#sketch)">
    <rect x="680" y="430" width="200" height="60" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4 3" rx="5"/>
  </g>
  <text x="780" y="456" font-size="13" fill="#71717a" text-anchor="middle" font-style="italic">· · ·  item N</text>
  <text x="780" y="478" font-size="10.5" fill="#8a8a91" text-anchor="middle">trace shows each</text>

  <!-- merge arrows -->
  <g stroke="#1e1e1e" stroke-width="1.4" fill="none" filter="url(#sketch2)">
    <path d="M 882 195 C 940 200, 980 260, 1000 290" marker-end="url(#arrInk)"/>
    <path d="M 882 285 L 1000 300" marker-end="url(#arrInk)"/>
    <path d="M 882 375 C 940 370, 980 320, 1000 310" marker-end="url(#arrInk)"/>
  </g>

  <!-- aggregate -->
  <g filter="url(#sketch)">
    <rect x="1000" y="250" width="170" height="100" fill="#ffec99" stroke="#1e1e1e" stroke-width="2.5" rx="6"/>
  </g>
  <text x="1020" y="282" font-size="18" font-weight="700" fill="#1e1e1e">aggregate</text>
  <text x="1020" y="302" font-size="12" fill="#8b6914">downstream step</text>
  <line x1="1020" y1="312" x2="1150" y2="312" stroke="#8b6914" stroke-width="1" opacity="0.4"/>
  <text x="1020" y="332" font-size="12" fill="#1e1e1e">sees a list of</text>
  <text x="1020" y="346" font-size="12" fill="#1e1e1e">all results</text>

  <text x="900" y="145" font-size="11" fill="#c2410c" font-style="italic">N sibling steps</text>
  <text x="900" y="510" font-size="11" fill="#71717a" font-style="italic">trace shows each invocation separately</text>

  <!-- footer note -->
  <line x1="70" y1="530" x2="1150" y2="530" stroke="#d4d4d8" stroke-width="1" filter="url(#sketch2)"/>
  <text x="70" y="550" font-size="13" fill="#3f3f46">
    <tspan font-weight="600" fill="#1e1e1e">Primitives that work inside foreach:</tspan>
    prompt (tag every row), python (validate every record), run (call an API per item), flow (sub-pipeline per input).
  </text>
</svg>
