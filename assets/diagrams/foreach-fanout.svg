<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="540" fill="#fbf9f3"/>

  <text x="60" y="56" font-family="Charter, Georgia, serif" font-size="26" font-weight="600" fill="#1a1a1a">Foreach fan-out</text>
  <text x="60" y="80" font-size="13" fill="#5c5c5c">A step declares <tspan font-family="'SF Mono', Menlo, monospace" font-size="12">foreach: &lt;list&gt;</tspan> and expands into N sibling steps at dispatch time. With <tspan font-family="'SF Mono', Menlo, monospace" font-size="12">parallel: true</tspan>, all N overlap.</text>
  <line x1="60" y1="100" x2="220" y2="100" stroke="#b45309" stroke-width="2.5"/>

  <!-- Source step (produces list) -->
  <g transform="translate(80, 250)" filter="url(#softShadow)">
    <rect width="200" height="90" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">source</text>
    <text x="16" y="42" font-size="11" fill="#8a8275" font-style="italic">any primitive</text>
    <line x1="16" y1="52" x2="184" y2="52" stroke="#e6e1d4"/>
    <text x="16" y="70" font-size="11.5" fill="#3a3a3a">returns a list of N items</text>
    <text x="16" y="84" font-family="'SF Mono', Menlo, monospace" font-size="10.5" fill="#5c5c5c">result = [...]</text>
  </g>

  <!-- Foreach gate (hexagon-ish) -->
  <g transform="translate(330, 272)">
    <polygon points="0,20 30,0 120,0 150,20 120,40 30,40" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="75" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="700" fill="#b45309">foreach</text>
    <text x="75" y="32" text-anchor="middle" font-size="10" fill="#5c5c5c" font-style="italic">for item in list</text>
  </g>

  <path d="M 282 295 L 326 292" stroke="#b45309" stroke-width="2.2" fill="none" marker-end="url(#arrAccent)"/>

  <!-- Connector lines from foreach to each process card -->
  <g stroke="#1a1a1a" stroke-width="1.2" fill="none">
    <path d="M 484 290 C 530 180, 620 180, 660 180"/>
    <path d="M 484 292 L 660 260"/>
    <path d="M 484 294 L 660 340"/>
    <path d="M 484 300 C 530 420, 620 420, 660 420"/>
  </g>

  <!-- Process cards -->
  <g transform="translate(660, 140)">
    <rect width="200" height="80" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2" filter="url(#softShadow)"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">process <tspan font-family="'SF Mono', Menlo, monospace" font-size="12.5" fill="#b45309">[0]</tspan></text>
    <line x1="16" y1="34" x2="184" y2="34" stroke="#e6e1d4"/>
    <text x="16" y="52" font-size="11.5" fill="#3a3a3a">runs once with item[0]</text>
    <text x="16" y="68" font-family="'SF Mono', Menlo, monospace" font-size="10.5" fill="#5c5c5c">{{item}} · {{loop.index}}</text>
  </g>

  <g transform="translate(660, 240)">
    <rect width="200" height="80" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2" filter="url(#softShadow)"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">process <tspan font-family="'SF Mono', Menlo, monospace" font-size="12.5" fill="#b45309">[1]</tspan></text>
    <line x1="16" y1="34" x2="184" y2="34" stroke="#e6e1d4"/>
    <text x="16" y="52" font-size="11.5" fill="#3a3a3a">runs once with item[1]</text>
    <text x="16" y="68" font-family="'SF Mono', Menlo, monospace" font-size="10.5" fill="#5c5c5c">parallel: true</text>
  </g>

  <g transform="translate(660, 340)">
    <rect width="200" height="80" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2" filter="url(#softShadow)"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="14" font-weight="600" fill="#1a1a1a">process <tspan font-family="'SF Mono', Menlo, monospace" font-size="12.5" fill="#b45309">[2]</tspan></text>
    <line x1="16" y1="34" x2="184" y2="34" stroke="#e6e1d4"/>
    <text x="16" y="52" font-size="11.5" fill="#3a3a3a">runs once with item[2]</text>
    <text x="16" y="68" font-family="'SF Mono', Menlo, monospace" font-size="10.5" fill="#5c5c5c">concurrency: N</text>
  </g>

  <!-- more items ellipsis -->
  <text x="760" y="448" text-anchor="middle" font-size="16" fill="#8a8275" font-style="italic">·  ·  ·  item N</text>

  <!-- Connector from each process card to aggregate -->
  <g stroke="#1a1a1a" stroke-width="1.2" fill="none">
    <path d="M 860 180 C 920 180, 960 260, 1000 290" marker-end="url(#arrInk)"/>
    <path d="M 860 280 L 1000 295" marker-end="url(#arrInk)"/>
    <path d="M 860 380 C 920 380, 960 310, 1000 300" marker-end="url(#arrInk)"/>
  </g>

  <!-- Aggregate -->
  <g transform="translate(1000, 250)" filter="url(#softShadow)">
    <rect width="160" height="90" rx="8" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Charter, Georgia, serif" font-size="15" font-weight="600" fill="#1a1a1a">aggregate</text>
    <text x="16" y="42" font-size="11" fill="#8a8275" font-style="italic">downstream step</text>
    <line x1="16" y1="52" x2="144" y2="52" stroke="#d4c899"/>
    <text x="16" y="70" font-size="11" fill="#3a3a3a">sees a list of</text>
    <text x="16" y="84" font-size="11" fill="#3a3a3a">all results</text>
  </g>

  <!-- Side annotations -->
  <text x="885" y="135" font-family="Charter, Georgia, serif" font-size="11" font-style="italic" fill="#5c5c5c">N sibling steps</text>
  <text x="885" y="455" font-family="Charter, Georgia, serif" font-size="11" font-style="italic" fill="#5c5c5c">trace shows each invocation separately</text>

  <!-- Bottom footer -->
  <g transform="translate(60, 480)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#e6e1d4" stroke-width="1"/>
    <text x="0" y="22" font-family="Charter, Georgia, serif" font-size="13" fill="#5c5c5c">
      <tspan font-weight="600" fill="#1a1a1a">Primitive that works inside foreach:</tspan>
      prompt (tag every row),
      python (validate every record),
      run (call an API per item),
      flow (run a sub-pipeline per input).
    </text>
  </g>
</svg>
