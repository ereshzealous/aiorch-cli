<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1720"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketch2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrInk" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 12 6 L 0 11 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect width="1400" height="1720" fill="#f4f5f7"/>

  <!-- HEADER -->
  <text x="90" y="78" font-size="40" font-weight="700" fill="#1e1e1e" letter-spacing="-0.8">How aiorch works</text>
  <path d="M 90 98 Q 190 94, 290 98 T 440 98" stroke="#c2410c" stroke-width="3.5" fill="none" filter="url(#sketch)" stroke-linecap="round"/>
  <text x="90" y="134" font-size="16" fill="#3f3f46">The six stages of <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#1e1e1e">aiorch run pipeline.yaml</tspan>,</text>
  <text x="90" y="156" font-size="16" fill="#3f3f46">from YAML to a recorded, replayable run.</text>

  <!-- STAGE 01 INPUTS -->
  <g filter="url(#sketch)"><circle cx="125" cy="278" r="42" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5"/></g>
  <text x="125" y="292" font-size="32" font-weight="700" fill="#1e1e1e" text-anchor="middle">01</text>
  <text x="90" y="348" font-size="11" font-weight="600" fill="#c2410c" letter-spacing="1.8">INPUTS</text>

  <g filter="url(#sketch)"><rect x="240" y="220" width="290" height="120" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" rx="6"/></g>
  <text x="260" y="254" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="18" font-weight="600" fill="#1e1e1e">pipeline.yaml</text>
  <line x1="260" y1="268" x2="510" y2="268" stroke="#1e1e1e" stroke-width="1" opacity="0.3"/>
  <text x="260" y="292" font-size="13" fill="#1e1e1e">name · input · steps</text>
  <text x="260" y="312" font-size="12" fill="#3f3f46">The declaration.</text>
  <text x="260" y="330" font-size="12" fill="#3f3f46">Committed to git.</text>

  <g filter="url(#sketch)"><rect x="590" y="220" width="290" height="120" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" rx="6"/></g>
  <text x="610" y="254" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">-i KEY=VALUE</text>
  <text x="610" y="278" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">--input file.json</text>
  <line x1="610" y1="292" x2="860" y2="292" stroke="#1e1e1e" stroke-width="1" opacity="0.3"/>
  <text x="610" y="314" font-size="12" fill="#3f3f46">Runtime overrides,</text>
  <text x="610" y="330" font-size="12" fill="#3f3f46">never committed.</text>

  <path d="M 385 342 C 420 380, 480 410, 530 438" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>
  <path d="M 735 342 C 700 380, 620 410, 570 438" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <path d="M 90 388 Q 350 384, 700 388 T 1310 388" stroke="#d4d4d8" stroke-width="1" fill="none" filter="url(#sketch2)"/>

  <!-- STAGE 02 PARSE -->
  <g filter="url(#sketch)"><circle cx="125" cy="540" r="42" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2.5"/></g>
  <text x="125" y="554" font-size="32" font-weight="700" fill="#1e1e1e" text-anchor="middle">02</text>
  <text x="90" y="610" font-size="11" font-weight="600" fill="#c2410c" letter-spacing="1.8">PARSE &amp; VALIDATE</text>
  <text x="90" y="632" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#71717a">aiorch.core.parser</text>

  <g filter="url(#sketch)"><rect x="240" y="450" width="380" height="210" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2.5" rx="6"/></g>
  <text x="260" y="488" font-size="24" font-weight="700" fill="#1e1e1e">Parser</text>
  <text x="260" y="510" font-size="12" font-weight="500" fill="#2b8a3e">Three layers, in order</text>
  <line x1="260" y1="522" x2="600" y2="522" stroke="#1e1e1e" stroke-width="1" opacity="0.3"/>
  <g filter="url(#sketch2)"><circle cx="280" cy="552" r="13" fill="none" stroke="#c2410c" stroke-width="1.8"/></g>
  <text x="280" y="557" font-size="12" font-weight="700" fill="#c2410c" text-anchor="middle">1</text>
  <text x="305" y="557" font-size="14" fill="#1e1e1e"><tspan font-weight="600">JSON Schema</tspan> — structural</text>
  <g filter="url(#sketch2)"><circle cx="280" cy="586" r="13" fill="none" stroke="#c2410c" stroke-width="1.8"/></g>
  <text x="280" y="591" font-size="12" font-weight="700" fill="#c2410c" text-anchor="middle">2</text>
  <text x="305" y="591" font-size="14" fill="#1e1e1e"><tspan font-weight="600">Pydantic</tspan> — types &amp; migrations</text>
  <g filter="url(#sketch2)"><circle cx="280" cy="620" r="13" fill="none" stroke="#c2410c" stroke-width="1.8"/></g>
  <text x="280" y="625" font-size="12" font-weight="700" fill="#c2410c" text-anchor="middle">3</text>
  <text x="305" y="625" font-size="14" fill="#1e1e1e"><tspan font-weight="600">Cross-field</tspan> — DAG semantics</text>

  <path d="M 640 500 Q 720 495, 820 488" stroke="#c2410c" stroke-width="1.5" fill="none" filter="url(#sketch2)" marker-end="url(#arrAccent)"/>
  <text x="840" y="476" font-size="14" fill="#c2410c" font-weight="600">Three layers, in order.</text>
  <text x="840" y="504" font-size="13" fill="#3f3f46">Structural issues surface before</text>
  <text x="840" y="522" font-size="13" fill="#3f3f46">type coercion, which surfaces</text>
  <text x="840" y="540" font-size="13" fill="#3f3f46">before DAG semantics.</text>
  <text x="840" y="568" font-size="13" fill="#3f3f46">Localising the failure matters</text>
  <text x="840" y="586" font-size="13" fill="#3f3f46">once a pipeline has dozens</text>
  <text x="840" y="604" font-size="13" fill="#3f3f46">of steps.</text>

  <path d="M 430 666 L 430 718" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <path d="M 90 700 Q 350 696, 700 700 T 1310 700" stroke="#d4d4d8" stroke-width="1" fill="none" filter="url(#sketch2)"/>

  <!-- STAGE 03 PLAN -->
  <g filter="url(#sketch)"><circle cx="125" cy="818" r="42" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2.5"/></g>
  <text x="125" y="832" font-size="32" font-weight="700" fill="#1e1e1e" text-anchor="middle">03</text>
  <text x="90" y="888" font-size="11" font-weight="600" fill="#c2410c" letter-spacing="1.8">PLAN</text>
  <text x="90" y="910" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#71717a">aiorch.core.dag</text>

  <g filter="url(#sketch)"><rect x="240" y="730" width="380" height="180" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2.5" rx="6"/></g>
  <text x="260" y="768" font-size="24" font-weight="700" fill="#1e1e1e">DAG builder</text>
  <text x="260" y="790" font-size="12" font-weight="500" fill="#6741d9">Dependency resolution</text>
  <line x1="260" y1="802" x2="600" y2="802" stroke="#1e1e1e" stroke-width="1" opacity="0.3"/>
  <text x="260" y="828" font-size="14" fill="#1e1e1e">Resolves <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13">depends:</tspan> edges</text>
  <text x="260" y="852" font-size="14" fill="#1e1e1e">Detects cycles via <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13">graphlib</tspan></text>
  <text x="260" y="876" font-size="14" fill="#1e1e1e">Groups independent steps into layers</text>

  <path d="M 640 770 Q 720 765, 820 758" stroke="#c2410c" stroke-width="1.5" fill="none" filter="url(#sketch2)" marker-end="url(#arrAccent)"/>
  <text x="840" y="742" font-size="14" fill="#c2410c" font-weight="600">Parallelism is a consequence</text>
  <text x="840" y="762" font-size="14" fill="#c2410c" font-weight="600">of the DAG, not a flag.</text>
  <text x="840" y="790" font-size="13" fill="#3f3f46">Steps without mutual dependencies</text>
  <text x="840" y="808" font-size="13" fill="#3f3f46">land on the same layer and run</text>
  <text x="840" y="826" font-size="13" fill="#3f3f46">concurrently. No <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="12">asyncio.gather()</tspan> —</text>
  <text x="840" y="844" font-size="13" fill="#3f3f46">the executor reads the layers.</text>

  <g transform="translate(1230, 760)">
    <g filter="url(#sketch2)">
      <circle cx="0" cy="25" r="8" fill="#1e1e1e"/>
      <circle cx="45" cy="8" r="8" fill="#1e1e1e"/>
      <circle cx="45" cy="25" r="8" fill="#1e1e1e"/>
      <circle cx="45" cy="42" r="8" fill="#1e1e1e"/>
      <circle cx="90" cy="25" r="8" fill="#c2410c"/>
      <line x1="8" y1="25" x2="37" y2="8" stroke="#1e1e1e" stroke-width="1.5"/>
      <line x1="8" y1="25" x2="37" y2="25" stroke="#1e1e1e" stroke-width="1.5"/>
      <line x1="8" y1="25" x2="37" y2="42" stroke="#1e1e1e" stroke-width="1.5"/>
      <line x1="53" y1="8" x2="82" y2="25" stroke="#1e1e1e" stroke-width="1.5"/>
      <line x1="53" y1="25" x2="82" y2="25" stroke="#1e1e1e" stroke-width="1.5"/>
      <line x1="53" y1="42" x2="82" y2="25" stroke="#1e1e1e" stroke-width="1.5"/>
    </g>
  </g>
  <text x="1230" y="830" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">L1 → L2 parallel → L3</text>

  <path d="M 430 916 L 430 968" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <path d="M 90 950 Q 350 946, 700 950 T 1310 950" stroke="#d4d4d8" stroke-width="1" fill="none" filter="url(#sketch2)"/>

  <!-- STAGE 04 EXECUTE (focal) -->
  <g filter="url(#sketch)"><circle cx="125" cy="1090" r="48" fill="#ffec99" stroke="#1e1e1e" stroke-width="3"/></g>
  <text x="125" y="1106" font-size="36" font-weight="700" fill="#1e1e1e" text-anchor="middle">04</text>
  <text x="90" y="1170" font-size="11" font-weight="600" fill="#c2410c" letter-spacing="1.8">EXECUTE</text>
  <text x="90" y="1192" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#71717a">aiorch.core.dag.execute</text>

  <g filter="url(#sketch)"><rect x="240" y="980" width="500" height="220" fill="#ffec99" stroke="#1e1e1e" stroke-width="3" rx="6"/></g>
  <text x="260" y="1022" font-size="30" font-weight="700" fill="#1e1e1e">Executor</text>
  <text x="260" y="1046" font-size="12" font-weight="500" fill="#8b6914">The only stage that holds state across time</text>
  <line x1="260" y1="1058" x2="720" y2="1058" stroke="#8b6914" stroke-width="1" opacity="0.4"/>
  <text x="260" y="1090" font-size="15" fill="#1e1e1e">Walks the DAG layer by layer</text>
  <text x="260" y="1114" font-size="15" fill="#1e1e1e">Owns retries, timeouts, <tspan font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="14">on_failure</tspan> cleanup</text>
  <text x="260" y="1138" font-size="15" fill="#1e1e1e">Dispatches every step to its primitive handler</text>
  <text x="260" y="1170" font-size="12" font-style="italic" fill="#8b6914">Shares nothing with the other stages except the artefact.</text>

  <path d="M 760 1040 Q 830 1035, 900 1028" stroke="#c2410c" stroke-width="1.5" fill="none" filter="url(#sketch2)" marker-end="url(#arrAccent)"/>
  <text x="920" y="1020" font-size="14" fill="#c2410c" font-weight="600">Asyncio thread pool,</text>
  <text x="920" y="1040" font-size="14" fill="#c2410c" font-weight="600">not subprocess per step.</text>
  <text x="920" y="1068" font-size="13" fill="#3f3f46">Subprocess spawn cost measurably</text>
  <text x="920" y="1086" font-size="13" fill="#3f3f46">dominated wall time when pipelines</text>
  <text x="920" y="1104" font-size="13" fill="#3f3f46">had many short Python steps.</text>
  <text x="920" y="1132" font-size="13" fill="#3f3f46">The GIL is an acceptable ceiling</text>
  <text x="920" y="1150" font-size="13" fill="#3f3f46">for I/O-bound work, and most</text>
  <text x="920" y="1168" font-size="13" fill="#3f3f46">primitive calls are I/O-bound.</text>

  <path d="M 490 1200 L 490 1250" stroke="#1e1e1e" stroke-width="1.8" fill="none" marker-end="url(#arrInk)" filter="url(#sketch2)"/>

  <g filter="url(#sketch)"><polygon points="490,1255 610,1305 490,1355 370,1305" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/></g>
  <text x="490" y="1298" font-size="14" font-weight="600" fill="#1e1e1e" text-anchor="middle">Primitive</text>
  <text x="490" y="1320" font-size="14" font-weight="600" fill="#1e1e1e" text-anchor="middle">dispatcher</text>

  <path d="M 90 1230 Q 350 1226, 700 1230 T 1310 1230" stroke="#d4d4d8" stroke-width="1" fill="none" filter="url(#sketch2)"/>

  <!-- STAGE 05 PRIMITIVES -->
  <g filter="url(#sketch)"><circle cx="125" cy="1440" r="42" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2.5"/></g>
  <text x="125" y="1454" font-size="32" font-weight="700" fill="#1e1e1e" text-anchor="middle">05</text>
  <text x="90" y="1510" font-size="11" font-weight="600" fill="#c2410c" letter-spacing="1.8">PRIMITIVES</text>
  <text x="90" y="1532" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="11" fill="#71717a">aiorch.runtime.*</text>

  <g stroke="#1e1e1e" stroke-width="1.4" fill="none" filter="url(#sketch2)">
    <path d="M 450 1355 C 370 1395, 290 1430, 265 1445"/>
    <path d="M 470 1355 C 440 1395, 420 1430, 435 1445"/>
    <path d="M 485 1355 L 605 1445"/>
    <path d="M 500 1355 C 540 1395, 710 1430, 775 1445"/>
    <path d="M 515 1355 C 600 1395, 850 1430, 945 1445"/>
    <path d="M 530 1355 C 680 1395, 990 1430, 1115 1445"/>
  </g>

  <g filter="url(#sketch2)"><rect x="195" y="1450" width="170" height="140" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/><rect x="195" y="1450" width="170" height="32" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2" rx="6"/></g>
  <text x="215" y="1472" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">prompt</text>
  <text x="215" y="1508" font-size="13" fill="#1e1e1e">LiteLLM call</text>
  <text x="215" y="1532" font-size="12" fill="#71717a">Cached by hash;</text>
  <text x="215" y="1550" font-size="12" fill="#71717a">any provider.</text>
  <text x="215" y="1578" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">runtime.prompt</text>

  <g filter="url(#sketch2)"><rect x="385" y="1450" width="170" height="140" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/><rect x="385" y="1450" width="170" height="32" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2" rx="6"/></g>
  <text x="405" y="1472" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">python</text>
  <text x="405" y="1508" font-size="13" fill="#1e1e1e">Exec in thread</text>
  <text x="405" y="1532" font-size="12" fill="#71717a">Your Python env;</text>
  <text x="405" y="1550" font-size="12" fill="#71717a">inputs / result.</text>
  <text x="405" y="1578" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">runtime.python</text>

  <g filter="url(#sketch2)"><rect x="575" y="1450" width="170" height="140" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/><rect x="575" y="1450" width="170" height="32" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2" rx="6"/></g>
  <text x="595" y="1472" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">run</text>
  <text x="595" y="1508" font-size="13" fill="#1e1e1e">Shell subprocess</text>
  <text x="595" y="1532" font-size="12" fill="#71717a">Auto-quoted Jinja;</text>
  <text x="595" y="1550" font-size="12" fill="#71717a">your $PATH, env.</text>
  <text x="595" y="1578" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">runtime.run</text>

  <g filter="url(#sketch2)"><rect x="765" y="1450" width="170" height="140" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/><rect x="765" y="1450" width="170" height="32" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2" rx="6"/></g>
  <text x="785" y="1472" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">flow</text>
  <text x="785" y="1508" font-size="13" fill="#1e1e1e">Sub-pipeline call</text>
  <text x="785" y="1532" font-size="12" fill="#71717a">Parser + executor,</text>
  <text x="785" y="1550" font-size="12" fill="#71717a">recursively.</text>
  <text x="785" y="1578" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">runtime.flow</text>

  <g filter="url(#sketch2)"><rect x="955" y="1450" width="170" height="140" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/><rect x="955" y="1450" width="170" height="32" fill="#ffec99" stroke="#1e1e1e" stroke-width="2" rx="6"/></g>
  <text x="975" y="1472" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">foreach</text>
  <text x="975" y="1508" font-size="13" fill="#1e1e1e">Fan over a list</text>
  <text x="975" y="1532" font-size="12" fill="#71717a">One per item;</text>
  <text x="975" y="1550" font-size="12" fill="#71717a">parallel: true.</text>
  <text x="975" y="1578" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">runtime.foreach</text>

  <g filter="url(#sketch2)"><rect x="1145" y="1450" width="170" height="140" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" rx="6"/><rect x="1145" y="1450" width="170" height="32" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2" rx="6"/></g>
  <text x="1165" y="1472" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" font-weight="600" fill="#1e1e1e">condition</text>
  <text x="1165" y="1508" font-size="13" fill="#1e1e1e">Gate the step</text>
  <text x="1165" y="1532" font-size="12" fill="#71717a">Skipped ≠ failed;</text>
  <text x="1165" y="1550" font-size="12" fill="#71717a">trace shows both.</text>
  <text x="1165" y="1578" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="10" fill="#8a8a91">runtime.condition</text>

  <g stroke="#71717a" stroke-width="1" stroke-dasharray="4 3" fill="none" filter="url(#sketch2)">
    <path d="M 265 1590 C 340 1650, 500 1690, 580 1700"/>
    <path d="M 435 1590 C 460 1650, 570 1690, 600 1700"/>
    <path d="M 605 1590 L 620 1700"/>
    <path d="M 775 1590 C 720 1650, 680 1690, 660 1700"/>
    <path d="M 945 1590 C 860 1650, 730 1690, 680 1700"/>
    <path d="M 1135 1590 C 980 1650, 790 1690, 710 1700"/>
  </g>
</svg>
