<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- aiorch Bracket Key icon — indigo on rounded rect -->
  <rect width="512" height="512" rx="96" fill="#4F46E5"/>

  <!-- Square bracket — left vertical spine + top/bottom arms -->
  <!-- Vertical spine -->
  <rect x="128" y="112" width="32" height="288" rx="16" fill="#FFFFFF"/>
  <!-- Top arm -->
  <rect x="128" y="112" width="112" height="32" rx="16" fill="#FFFFFF"/>
  <!-- Bottom arm -->
  <rect x="128" y="368" width="112" height="32" rx="16" fill="#FFFFFF"/>

  <!-- Two YAML list dashes inside the bracket scope -->
  <!-- Dash 1 — full opacity, longer -->
  <rect x="272" y="192" width="128" height="36" rx="18" fill="#FFFFFF" opacity="0.95"/>
  <!-- Dash 2 — faded, shorter -->
  <rect x="272" y="288" width="96" height="36" rx="18" fill="#FFFFFF" opacity="0.5"/>
</svg>
