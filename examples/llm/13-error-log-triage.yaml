name: error-log-triage
description: |
  Read a nginx-style error log, Python parses + dedupes by message
  shape, LLM groups the top patterns by likely root cause and suggests
  a next-step action per group. Writes the triage report to disk.

  Hybrid shape: Python handles the deterministic parsing / dedup /
  counting (cheap), LLM handles the pattern-matching / root-cause
  narrative (what LLMs are actually good at).

  Usage:
    aiorch run 13-error-log-triage.yaml
    aiorch run 13-error-log-triage.yaml -i log_path=/var/log/nginx/error.log

input:
  log_path:
    type: string
    default: ./inputs/sample-errors.log

steps:
  parse:
    # Parse the error log into (timestamp, severity, message) tuples,
    # strip variable bits (IPs, request IDs, numeric tokens) so
    # near-duplicates collapse onto one pattern, and return the top 10
    # patterns by frequency.
    python: |
      import pathlib, re
      from collections import Counter

      text = pathlib.Path(inputs["log_path"]).read_text()
      lines = [ln for ln in text.splitlines() if ln.strip()]
      print(f"Loaded {len(lines)} log lines from {inputs['log_path']}")

      def normalize(msg):
          msg = re.sub(r"\b\d{1,3}(?:\.\d{1,3}){3}\b", "<ip>", msg)
          msg = re.sub(r"\b[0-9a-f]{8,}\b", "<hex>", msg)
          msg = re.sub(r"\b\d{2,}\b", "<num>", msg)
          msg = re.sub(r"/\S+", "<path>", msg)
          return msg.strip()

      patterns = Counter()
      examples = {}
      for ln in lines:
          m = re.search(r"\[(error|warn|crit|alert)\]\s+(.*)", ln)
          if not m:
              continue
          severity, raw = m.group(1), m.group(2)
          pat = f"[{severity}] {normalize(raw)[:200]}"
          patterns[pat] += 1
          examples.setdefault(pat, raw[:240])

      top = [{"pattern": p, "count": c, "example": examples[p]}
             for p, c in patterns.most_common(10)]
      print(f"Top {len(top)} patterns cover "
            f"{sum(p['count'] for p in top)}/{sum(patterns.values())} lines")
      result = top
    output: patterns

  triage:
    prompt: |
      You are an on-call engineer reviewing the top error patterns
      from a production web server log.

      Patterns (highest-count first):
      {% for p in patterns %}
      - [{{p.count}}x] {{p.pattern}}
        example: {{p.example}}
      {% endfor %}

      For EACH pattern, reply with a JSON object with:
        pattern_index : the 1-based index above
        root_cause    : one short clause naming the likely cause
        severity      : "low", "medium", or "high"
        next_action   : one concrete sentence the on-call should do
                        next (e.g. "page auth team", "bump rate limit",
                        "ignore — third-party scanner")

      Reply with a JSON array, one object per pattern, same order.
    format: json
    schema:
      type: array
      items:
        type: object
        required: [pattern_index, root_cause, severity, next_action]
        properties:
          pattern_index: { type: integer }
          root_cause:    { type: string }
          severity:      { type: string, enum: [low, medium, high] }
          next_action:   { type: string }
    retry_on_invalid: 2
    depends: [parse]
    output: llm_triage

  write_report:
    python: |
      import json, pathlib

      patterns = inputs["patterns"]
      # Schema declares this step returns a bare array of triage objects.
      triage = inputs["llm_triage"]

      merged = []
      for t in triage:
          i = t["pattern_index"] - 1
          if 0 <= i < len(patterns):
              merged.append({**patterns[i], **t})

      rank = {"high": 0, "medium": 1, "low": 2}
      merged.sort(key=lambda m: (rank.get(m.get("severity"), 99), -m["count"]))

      out = pathlib.Path("./inputs/error-triage-report.json")
      out.write_text(json.dumps(merged, indent=2))

      print("==== Error-log triage ====")
      for m in merged:
          print(f"  [{m.get('severity', '?'):6}] {m['count']:3}x  "
                f"{m.get('root_cause', '?')[:60]}")
          print(f"          → {m.get('next_action', '?')}")
      print()
      print(f"Full report: {out.resolve()}")
      result = {"report": str(out), "patterns_triaged": len(merged)}
    depends: [triage]
    output: report
